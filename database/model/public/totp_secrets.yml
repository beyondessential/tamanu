version: 2
sources:
  - name: tamanu
    schema: public
    description: "{{ doc('generic__schema') }}"
    tables:
      - name: totp_secrets
        description: "{{ doc('table__totp_secrets') }}"
        config:
          tags:
            - administration
          meta:
            triggers: []
        columns:
          - name: id
            data_type: uuid
            description: "{{ doc('generic__id') }} in totp_secrets."
            data_tests:
              - unique
              - not_null
          - name: created_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__created_at') }} in totp_secrets."
            data_tests:
              - not_null
          - name: updated_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__updated_at') }} in totp_secrets."
            data_tests:
              - not_null
          - name: deleted_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__deleted_at') }} in totp_secrets."
          - name: user_id
            data_type: character varying(255)
            description: "{{ doc('totp_secrets__user_id') }}"
            data_tests:
              - not_null
          - name: secret
            data_type: text
            description: "{{ doc('totp_secrets__secret') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: string
          - name: confirmed_at
            data_type: timestamp with time zone
            description: "{{ doc('totp_secrets__confirmed_at') }}"
