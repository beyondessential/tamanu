version: 2
sources:
  - name: tamanu
    schema: public
    description: "{{ doc('generic__schema') }}"
    tables:
      - name: invoice_insurance_plan_payments
        description: "{{ doc('table__invoice_insurance_plan_payments') }}"
        config:
          tags:
            - administration
          meta:
            triggers:
              - notify_invoice_insurance_plan_payments_changed
              - record_invoice_insurance_plan_payments_changelog
              - set_invoice_insurance_plan_payments_updated_at
              - set_invoice_insurance_plan_payments_updated_at_sync_tick
        columns:
          - name: id
            data_type: uuid
            description: "{{ doc('generic__id') }} in invoice_insurance_plan_payments."
            data_tests:
              - unique
              - not_null
          - name: invoice_payment_id
            data_type: uuid
            description: "{{ doc('invoice_insurance_plan_payments__invoice_payment_id') }}"
            data_tests:
              - unique
              - not_null
              - relationships:
                  arguments:
                    to: source('tamanu', 'invoice_payments')
                    field: id
          - name: invoice_insurance_plan_id
            data_type: character varying(255)
            description: "{{ doc('invoice_insurance_plan_payments__invoice_insurance_plan_id') }}"
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tamanu', 'invoice_insurance_plans')
                    field: id
          - name: status
            data_type: character varying(255)
            description: "{{ doc('invoice_insurance_plan_payments__status') }}"
            data_tests:
              - not_null
              - accepted_values:
                  arguments:
                    values:
                      - unpaid
                      - paid
                      - partial
                      - rejected
          - name: reason
            data_type: character varying(255)
            description: "{{ doc('invoice_insurance_plan_payments__reason') }}"
            config:
              meta:
                masking: text
          - name: created_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__created_at') }} in invoice_insurance_plan_payments."
            data_tests:
              - not_null
          - name: updated_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__updated_at') }} in invoice_insurance_plan_payments."
          - name: deleted_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__deleted_at') }} in invoice_insurance_plan_payments."
          - name: updated_at_sync_tick
            data_type: bigint
            description: "{{ doc('generic__updated_at_sync_tick') }} in invoice_insurance_plan_payments."
            data_tests:
              - not_null
