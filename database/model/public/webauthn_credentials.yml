version: 2
sources:
  - name: tamanu
    schema: public
    description: "{{ doc('generic__schema') }}"
    tables:
      - name: webauthn_credentials
        description: "{{ doc('table__webauthn_credentials') }}"
        config:
          tags:
            - administration
          meta:
            triggers:
              - notify_webauthn_credentials_changed
              - record_webauthn_credentials_changelog
              - set_webauthn_credentials_updated_at
              - set_webauthn_credentials_updated_at_sync_tick
        columns:
          - name: id
            data_type: character varying(255)
            description: "{{ doc('generic__id') }} in webauthn_credentials."
            data_tests:
              - unique
              - not_null
          - name: created_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__created_at') }} in webauthn_credentials."
            data_tests:
              - not_null
          - name: updated_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__updated_at') }} in webauthn_credentials."
            data_tests:
              - not_null
          - name: deleted_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__deleted_at') }} in webauthn_credentials."
          - name: updated_at_sync_tick
            data_type: bigint
            description: "{{ doc('generic__updated_at_sync_tick') }} in webauthn_credentials."
            data_tests:
              - not_null
          - name: user_id
            data_type: character varying(255)
            description: "{{ doc('webauthn_credentials__user_id') }}"
            data_tests:
              - not_null
          - name: credential_id
            data_type: text
            description: "{{ doc('webauthn_credentials__credential_id') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: string
          - name: public_key
            data_type: text
            description: "{{ doc('webauthn_credentials__public_key') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: string
          - name: rp_id
            data_type: text
            description: "{{ doc('webauthn_credentials__rp_id') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: text
          - name: transports
            data_type: jsonb
            description: "{{ doc('webauthn_credentials__transports') }}"
          - name: aaguid
            data_type: text
            description: "{{ doc('webauthn_credentials__aaguid') }}"
            config:
              meta:
                masking: text
          - name: enrolment_origin
            data_type: text
            description: "{{ doc('webauthn_credentials__enrolment_origin') }}"
            config:
              meta:
                masking: text
          - name: friendly_name
            data_type: text
            description: "{{ doc('webauthn_credentials__friendly_name') }}"
            config:
              meta:
                masking: text
          - name: last_used_at
            data_type: timestamp with time zone
            description: "{{ doc('webauthn_credentials__last_used_at') }}"
