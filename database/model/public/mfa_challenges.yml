version: 2
sources:
  - name: tamanu
    schema: public
    description: "{{ doc('generic__schema') }}"
    tables:
      - name: mfa_challenges
        description: "{{ doc('table__mfa_challenges') }}"
        config:
          tags:
            - system
          meta:
            triggers: []
        columns:
          - name: id
            data_type: uuid
            description: "{{ doc('generic__id') }} in mfa_challenges."
            data_tests:
              - unique
              - not_null
          - name: created_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__created_at') }} in mfa_challenges."
            data_tests:
              - not_null
          - name: updated_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__updated_at') }} in mfa_challenges."
            data_tests:
              - not_null
          - name: deleted_at
            data_type: timestamp with time zone
            description: "{{ doc('generic__deleted_at') }} in mfa_challenges."
          - name: user_id
            data_type: character varying(255)
            description: "{{ doc('mfa_challenges__user_id') }}"
          - name: type
            data_type: text
            description: "{{ doc('mfa_challenges__type') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: text
          - name: token
            data_type: text
            description: "{{ doc('mfa_challenges__token') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: string
          - name: expires_at
            data_type: timestamp with time zone
            description: "{{ doc('mfa_challenges__expires_at') }}"
            data_tests:
              - not_null
          - name: used_at
            data_type: timestamp with time zone
            description: "{{ doc('mfa_challenges__used_at') }}"
