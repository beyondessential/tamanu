version: 2
sources:
  - name: ask_ai__tamanu
    schema: ask_ai
    description: "{{ doc('ask_ai__generic__schema') }}"
    tables:
      - name: messages
        description: "{{ doc('ask_ai__table__messages') }}"
        config:
          tags: []
          meta:
            triggers: []
        columns:
          - name: id
            data_type: character varying(255)
            description: "{{ doc('ask_ai__messages__id') }}"
            data_tests:
              - unique
              - not_null
          - name: conversation_id
            data_type: character varying(255)
            description: "{{ doc('ask_ai__messages__conversation_id') }}"
            data_tests:
              - not_null
          - name: role
            data_type: text
            description: "{{ doc('ask_ai__messages__role') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: text
          - name: content
            data_type: text
            description: "{{ doc('ask_ai__messages__content') }}"
            data_tests:
              - not_null
            config:
              meta:
                masking: text
          - name: created_at
            data_type: timestamp with time zone
            description: "{{ doc('ask_ai__messages__created_at') }}"
            data_tests:
              - not_null
          - name: updated_at
            data_type: timestamp with time zone
            description: "{{ doc('ask_ai__messages__updated_at') }}"
            data_tests:
              - not_null
