      - post:
          url: '/api/labRequest'
          headers:
            Authorization: 'Bearer {{token}}'
            'Content-Type': 'application/json'
          json: '{{labRequestPayload}}'
  - name: Create lab request (panel, sample collected)
    beforeScenario:
      - authenticate
    flow:
      - function: generateLabRequestPayloadPanelSampleCollected
      - post:
          url: '/api/labRequest'
          headers:
            Authorization: 'Bearer {{token}}'
            'Content-Type': 'application/json'
          json: '{{labRequestPayload}}'
  - name: Create lab request (individual, sample + note)
    beforeScenario:
      - authenticate
    flow:
      - function: generateLabRequestPayloadIndividualSampleAndNote
      - post:
          url: '/api/labRequest'
          headers:
            Authorization: 'Bearer {{token}}'
            'Content-Type': 'application/json'
          json: '{{labRequestPayload}}'
