scenarios:
  - name: Create lab request (individual, single test)
    beforeScenario:
      - authenticate
    flow:
      - function: generateLabRequestPayloadIndividualSingle
      - post:
          url: '/api/labRequest'
          headers:
            Authorization: 'Bearer {{token}}'
            'Content-Type': 'application/json'
          json: '{{labRequestPayload}}'
  - name: Create lab request (individual, two tests same category)
    beforeScenario:
      - authenticate
    flow:
      - function: generateLabRequestPayloadIndividualTwoTestsSameCategory
      - post:
          url: '/api/labRequest'
          headers:
            Authorization: 'Bearer {{token}}'
            'Content-Type': 'application/json'
          json: '{{labRequestPayload}}'
  - name: Create lab request (individual, two categories)
    beforeScenario:
      - authenticate
    flow:
      - function: generateLabRequestPayloadIndividualTwoCategories
      - post:
          url: '/api/labRequest'
          headers:
            Authorization: 'Bearer {{token}}'
            'Content-Type': 'application/json'
          json: '{{labRequestPayload}}'
  - name: Create lab request (panel)
    beforeScenario:
      - authenticate
