name: CD Fake Data

on:
  workflow_call:
    inputs:
      deploy-name:
        type: string
        required: true
      options:
        type: string
        required: true

permissions:
  contents: read
  id-token: write # for Tailscale OIDC authentication

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: ${{ inputs.deploy-name }}
    if: fromJson(inputs.options).fakedata != 0
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-cd
        with:
          tailscale-oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID }}
          tailscale-tags: ${{ vars.TS_TAGS }}
          tailscale-k8s-operator-hostname: ${{ vars.TS_K8S_OPERATOR_HOSTNAME }}

      - run: npm ci --include-workspace-root --workspace=scripts
      - run: npm run build -- --filter=scripts^...

      - name: Configure tamanu to connect to the database in k8s
        run: |
          ns="tamanu-${{ inputs.deploy-name }}"
          pgpass=$(kubectl get -n "$ns" secrets central-db-app -o jsonpath='{.data.password}' | base64 -d)
          echo "::add-mask::$pgpass"
          echo "NODE_CONFIG_DIR=$(pwd)/packages/central-server/config" | tee -a $GITHUB_ENV
          echo "NODE_CONFIG=$(jq -Rc '{db:{host:"127.0.0.1",port:4444,name:"app",username:"app",password:.}}' <<< $pgpass)" | tee -a $GITHUB_ENV

      - name: Add fake data to the deployment
        run: |
          set -x
          ns="tamanu-${{ inputs.deploy-name }}"
          rounds=${{ fromJson(inputs.options).fakedata }}

          # Wait for central-api to be ready
          kubectl -n "$ns" rollout status deploy/central-api --timeout=300s

          # Resolve tally file path inside the container (sibling of populateDb's index)
          tally=$(kubectl -n "$ns" exec deploy/central-api -- \
            node -e "const p=require('path');console.log(p.join(p.dirname(require.resolve('@tamanu/fake-data/populateDb')),'parseTally','standard.json'))")

          # Run fake data generation inside the central-api pod using the tally file.
          # Values are passed as env vars (not interpolated into JS source) so paths
          # containing quotes, backslashes, or dollar signs cannot break the script.
          kubectl -n "$ns" exec deploy/central-api -- env "TALLY=$tally" "ROUNDS=$rounds" node -e '
            const { initDatabase } = require("@tamanu/database/services/database");
            const { populateDbFromTallyFile } = require("@tamanu/fake-data/populateDb");
            const config = require("config");

            (async () => {
              const db = await initDatabase(config.db);
              const tally = process.env.TALLY;
              const rounds = parseInt(process.env.ROUNDS, 10);
              if (!Number.isInteger(rounds) || rounds < 1) {
                throw new Error("Invalid ROUNDS: " + process.env.ROUNDS);
              }
              console.log("Generating fake data:", rounds, "rounds using tally:", tally);
              for (let i = 0; i < rounds; i++) {
                console.log("Round " + (i + 1) + "/" + rounds);
                await populateDbFromTallyFile(db.models, tally);
              }
              await db.sequelize.close();
              console.log("Done");
            })().catch(e => { console.error(e); process.exit(1); });
          '
