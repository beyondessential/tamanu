name: CI

on:
  workflow_dispatch:
  merge_group:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: "--max-old-space-size=6144"
  NODE_ENV: test
  NODE_MODULES_PATHS: |
    node_modules
    packages/*/node_modules
  BUILD_PATHS: |
    packages/*/dist

jobs:
  plan:
    name: Plan CI
    runs-on: ubuntu-latest
    outputs:
      test-matrix: ${{ steps.plan.outputs.test-matrix }}
      migrations-matrix: ${{ steps.plan.outputs.migrations-matrix }}
      run-test: ${{ steps.plan.outputs.run-test }}
      run-migrations: ${{ steps.plan.outputs.run-migrations }}
      run-mobile: ${{ steps.plan.outputs.run-mobile }}
      run-facility-offline: ${{ steps.plan.outputs.run-facility-offline }}
      run-dbt-model: ${{ steps.plan.outputs.run-dbt-model }}
      allowed-skips: ${{ steps.plan.outputs.allowed-skips }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
      - name: Plan
        id: plan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/plan-ci.mjs

  node_version:
    name: Check node version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Check dockerfile against .node-version
        run: |
          file=$(cat .node-version | cut -c2- | cut -d. -f1)
          dckr=$(grep -oP '(?<=^FROM node:)\d+' Dockerfile)
          echo "Node.js major in Dockerfile:    $dckr"
          echo "Node.js major in .node-version: $file"
          test "$dckr" = "$file"

  node_modules_cache:
    name: Cache node modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}

  build:
    needs: node_modules_cache
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - uses: actions/cache/restore@v5
        id: build-cache
        with:
          key: ${{ runner.os }}-build-${{ github.sha }}
          path: ${{ env.BUILD_PATHS }}
      - if: steps.build-cache.outputs.cache-hit != 'true'
        run: npm install --include-workspace-root
      - if: steps.build-cache.outputs.cache-hit != 'true'
        run: npm run build
      - if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ runner.os }}-build-${{ github.sha }}
          path: ${{ env.BUILD_PATHS }}

  test:
    needs: [plan, node_modules_cache, build]
    if: needs.plan.outputs.run-test == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.test-matrix) }}

    name: Test ${{ matrix.package }} ${{ matrix.shard }} (pg=${{ matrix.postgres || 'no' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-build-${{ github.sha }}
          path: ${{ env.BUILD_PATHS }}

      - run: npm install --include-workspace-root --workspace=${{ matrix.package }}

      - name: Install and start postgres if needed
        if: matrix.postgres
        run: |
          source .github/scripts/install-postgres-ubuntu.sh ${{ matrix.postgres }}
          .github/scripts/setup-postgres-for-one-package.sh ${{ matrix.package }}

      - name: Run tests
        env:
          package: ${{ matrix.package }}
          shard: ${{ matrix.shard }}
        run: |
          [[ -z "$shard" ]] || shard="--shard $shard"
          npm run --workspace "$package" test -- $shard

  lint:
    needs: node_modules_cache
    name: Lint packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - run: npm install --include-workspace-root

      - name: Lint errors
        run: npm run lint-all -- --quiet

      - name: Lint warnings
        run: npm run lint-all

  migrations:
    needs: [plan, node_modules_cache, build]
    if: needs.plan.outputs.run-migrations == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.migrations-matrix) }}

    name: Test migrations server=${{ matrix.server }} pg=${{ matrix.postgres }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-build-${{ github.sha }}
          path: ${{ env.BUILD_PATHS }}

      - run: npm install --include-workspace-root --workspace=@tamanu/${{ matrix.server }}

      - name: Install and start postgres ${{ matrix.postgres }}
        run: |
          source .github/scripts/install-postgres-ubuntu.sh ${{ matrix.postgres }}
          .github/scripts/setup-postgres-for-one-package.sh migrations

      - run: scripts/apply_and_revert_server_migrations.sh ${{ matrix.server }}

  test-mobile:
    needs: [plan, node_modules_cache, build]
    if: needs.plan.outputs.run-mobile == 'true'
    name: Test mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-build-${{ github.sha }}
          path: ${{ env.BUILD_PATHS }}

      - run: npm install --include-workspace-root --workspace=@tamanu/mobile

      - run: npm run test
        working-directory: packages/mobile

  test-facility-offline:
    needs: [plan, node_modules_cache, build]
    if: needs.plan.outputs.run-facility-offline == 'true'
    name: Test the facility server with the central server being down
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - uses: actions/cache/restore@v3
        with:
          key: ${{ runner.os }}-build-${{ github.sha }}
          path: ${{ env.BUILD_PATHS }}
      - name: Install dependencies
        run: |
          npm install \
            --include-workspace-root \
            --workspace=@tamanu/central-server \
            --workspace=@tamanu/facility-server

      - name: Install and start postgres
        run: |
          source .github/scripts/install-postgres-ubuntu.sh 18
          .github/scripts/test-facility-offline.sh setup-postgres
      - name: Start a central server
        run: .github/scripts/test-facility-offline.sh central-start
      - name: Start a facility server
        run: .github/scripts/test-facility-offline.sh facility-start
      - name: Stop the servers and print logs
        run: .github/scripts/test-facility-offline.sh stop-and-print
      - name: Start a facility server again without a central one
        run: .github/scripts/test-facility-offline.sh facility-start-again

  test-package-lock:
    needs: node_modules_cache
    name: Check package-lock.json is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - run: npm install --include-workspace-root
      - run: git diff --exit-code

  dbt-model:
    needs: [plan, node_modules_cache, build]
    if: needs.plan.outputs.run-dbt-model == 'true'
    name: DBT model up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-build-${{ github.sha }}
          path: ${{ env.BUILD_PATHS }}

      - name: Install and start postgres
        run: |
          source .github/scripts/install-postgres-ubuntu.sh 18

          createuser --superuser tamanu
          psql -c "ALTER USER tamanu PASSWORD 'tamanu';" postgres
          createdb -O tamanu central
          createdb -O tamanu facility

      - run: |
          npm install \
            --include-workspace-root \
            --workspace=@tamanu/central-server \
            --workspace=scripts

      - name: Configure Tamanu
        run: |
          echo '{"db":{"host":"localhost","name":"central","username":"tamanu","password":"tamanu"}}' > packages/central-server/config/local.json5

      - name: Run Migrations
        run: |
          npm run --workspace @tamanu/central-server start upgrade

      - name: Check model is up to date
        run: |
          npm run dbt-generate-model --fail-on-missing-config
          if [[ -n $(git status --porcelain=v2 database) ]]; then
              git diff -- database
              echo "The dbt model is behind the Tamanu database!"
              echo "Run 'npm run dbt-generate-model' and commit the result."
              exit 1
          fi

      - name: Check model is valid (ie that docs can generate)
        run: |
          pip3 install \
            "dbt-core==1.10.13" \
            "dbt-postgres==1.9.1" \
            "dbt-adapters==1.16.7" \
            "dbt-common==1.35.0"
          npm run dbt-generate-docs

  dbt-todos:
    needs: node_modules_cache
    name: DBT model TODOs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}

      - run: npm install --include-workspace-root --workspace=scripts
      - run: npm run dbt-check-todos

  typos:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check spelling
        uses: crate-ci/typos@v1.36.3
        with:
          config: .typos.toml

  # Dummy job to have a stable name for PR requirements
  tests-pass:
    if: always() # always run even if dependencies fail
    name: Tests pass
    needs:
      - plan
      - node_version
      - build
      - test
      - lint
      - migrations
      - test-mobile
      - test-facility-offline
      - test-package-lock
      - dbt-model
      - dbt-todos
      - typos
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: ${{ needs.plan.outputs.allowed-skips }}
