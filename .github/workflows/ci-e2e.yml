name: E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

env:
  NODE_OPTIONS: "--max-old-space-size=6144"
  NODE_ENV: e2e
  NODE_MODULES_PATHS: |
    node_modules
    packages/*/node_modules
    !packages/mobile/node_modules

jobs:
  check-e2e-request:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body;
            const e2eMatch = body?.match(/\[(?<checked>[ x])\]\s+\*\*Run E2E Tests\*\* <!-- #e2e -->/);
            core.setOutput('should_run', e2eMatch?.groups.checked === 'x');

  node_modules_cache:
    needs: check-e2e-request
    if: needs.check-e2e-request.outputs.should_run == 'true'
    name: Cache node modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v3
        id: cache
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v3
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}

  e2e:
    needs: node_modules_cache
    name: E2E Tests ${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    env:
      FACILITY_FRONTEND_URL: http://localhost:5173
      ADMIN_FRONTEND_URL: http://localhost:5174
      LAUNCH_LOCAL_SERVERS_WHEN_RUNNING_TESTS: true
      IS_PLAYWRIGHT_TEST: true
      TEST_EMAIL: admin@tamanu.io
      TEST_PASSWORD: admin
      TZ: Pacific/Auckland

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v3
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}

      - run: npm i
      - run: npm run build-shared
      - run: npm run --workspace @tamanu/central-server build
      - run: npm run --workspace @tamanu/facility-server build

      - name: Setup postgres dbs
        run: |
          source .github/scripts/install-postgres-ubuntu.sh 16
          .github/scripts/e2e-test-setup.sh setup-postgres
      - name: Setup central server
        run: .github/scripts/e2e-test-setup.sh setup-central
      - name: Setup facility server
        run: .github/scripts/e2e-test-setup.sh setup-facility
      - name: Start servers
        run: .github/scripts/e2e-test-setup.sh start-servers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }}
        working-directory: packages/e2e-tests
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ strategy.job-index }}
          path: packages/e2e-tests/blob-report/
          retention-days: 7
      - name: Upload Playwright JSON report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-json-${{ strategy.job-index }}
          path: packages/e2e-tests/test-results/results.json
          retention-days: 7

  e2e_report:
    needs: e2e
    if: always() && needs.e2e.result != 'skipped'
    name: E2E report summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Download Playwright JSON reports
        uses: actions/download-artifact@v8
        with:
          pattern: playwright-json-*
          merge-multiple: true
          path: .artifacts/playwright-json
      - name: Generate E2E feature matrix summary
        run: |
          node scripts/e2e/generate-ci-feature-matrix-summary.mjs \
            --matrix docs/testing/e2e-feature-matrix.md \
            --playwright-json-dir .artifacts/playwright-json \
            --output .artifacts/e2e-feature-matrix-summary.md
      - name: Publish summary in GitHub Actions
        run: cat .artifacts/e2e-feature-matrix-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload matrix summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: e2e-feature-matrix-summary
          path: .artifacts/e2e-feature-matrix-summary.md
          retention-days: 7
