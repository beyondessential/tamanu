name: E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  merge_group:

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  NODE_OPTIONS: "--max-old-space-size=6144"
  NODE_ENV: e2e
  NODE_MODULES_PATHS: |
    node_modules
    packages/*/node_modules
    !packages/mobile/node_modules

jobs:
  node_modules_cache:
    if: "github.event_name == 'merge_group' || contains(github.event.pull_request.body, '[x] **Run E2E tests** <!-- #e2e -->')"
    name: Cache node modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        id: cache
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}

  e2e_prepare:
    needs: node_modules_cache
    name: Prepare E2E artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}

      - run: npm i
      - run: npm run build-shared
      - run: npm run --workspace @tamanu/central-server build
      - run: npm run --workspace @tamanu/facility-server build
      # Build the web frontend up-front so E2E shards can serve it via
      # `vite preview` instead of starting the dev server on every shard. The
      # dev-server's cold-start optimizeDeps crawl is the primary source of
      # intermittent login-page timeouts on CI runners post Vite 6 upgrade.
      - run: npm run --workspace @tamanu/web-frontend build

      - name: Setup postgres dbs
        run: |
          source .github/scripts/install-postgres-ubuntu.sh 18
          .github/scripts/e2e-test-setup.sh setup-postgres
      - name: Setup central server
        run: .github/scripts/e2e-test-setup.sh setup-central
      - name: Setup facility server
        run: .github/scripts/e2e-test-setup.sh setup-facility
      - name: Start servers
        run: .github/scripts/e2e-test-setup.sh start-servers
      - name: Snapshot prepared databases
        run: |
          mkdir -p e2e-prepared-db
          pg_dump -Fc -d central -f e2e-prepared-db/central.dump
          pg_dump -Fc -d facility -f e2e-prepared-db/facility.dump
      - name: Upload built server artifacts
        uses: actions/upload-artifact@v7
        with:
          name: e2e-built-artifacts
          path: |
            packages/*/dist
            packages/central-server/config/local.json5
            packages/central-server/provisioning.json5
            packages/facility-server/config/local.json5
          retention-days: 1
      - name: Upload prepared database snapshot
        uses: actions/upload-artifact@v7
        with:
          name: e2e-db-snapshot
          path: e2e-prepared-db
          retention-days: 1

  e2e:
    needs: e2e_prepare
    name: E2E Tests ${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    env:
      FACILITY_FRONTEND_URL: http://localhost:5173
      ADMIN_FRONTEND_URL: http://localhost:5174
      LAUNCH_LOCAL_SERVERS_WHEN_RUNNING_TESTS: true
      IS_PLAYWRIGHT_TEST: true
      TEST_EMAIL: admin@tamanu.io
      TEST_PASSWORD: admin
      TZ: Pacific/Auckland

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - name: Download built server artifacts
        uses: actions/download-artifact@v8
        with:
          name: e2e-built-artifacts
          path: packages
      - name: Download prepared database snapshot
        uses: actions/download-artifact@v8
        with:
          name: e2e-db-snapshot
          path: e2e-prepared-db

      - run: npm i

      - name: Setup postgres dbs
        run: |
          source .github/scripts/install-postgres-ubuntu.sh 18
          createuser --superuser tamanu
          psql -c "ALTER USER tamanu PASSWORD 'tamanu';" postgres
          createdb -O tamanu central
          createdb -O tamanu facility
          pg_restore --clean --if-exists --no-owner --no-privileges -d central e2e-prepared-db/central.dump
          pg_restore --clean --if-exists --no-owner --no-privileges -d facility e2e-prepared-db/facility.dump
      - name: Start servers
        run: .github/scripts/e2e-test-setup.sh start-servers-no-sync
      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          path: ~/.cache/ms-playwright
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Save Playwright browser cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          path: ~/.cache/ms-playwright
      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shard }}
        working-directory: packages/e2e-tests
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ strategy.job-index }}
          path: packages/e2e-tests/blob-report/
          retention-days: 7

  e2e_failure_report:
    name: E2E Failure Report
    if: "always() && (github.event_name == 'merge_group' || contains(github.event.pull_request.body, '[x] **Run E2E tests** <!-- #e2e -->')) && needs.e2e.result != 'success'"
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          path: ${{ env.NODE_MODULES_PATHS }}
      - run: npm i
      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: packages/e2e-tests/all-blob-reports
          merge-multiple: true
      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        working-directory: packages/e2e-tests
      - name: Upload E2E failure report
        id: e2e-report-upload
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-report-${{ github.run_number }}
          path: packages/e2e-tests/playwright-report/
          retention-days: 7
      - name: Post comment with E2E failure report
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.e2e-report-upload.outputs.artifact-url }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const { ARTIFACT_URL, RUN_NUMBER, RUN_URL } = process.env;
            const { repo, owner } = context.repo;
            const headRef = context.payload.merge_group?.head_ref ?? '';
            const prNumber =
              context.issue.number ?? headRef.match(/\/pr-(\d+)-/)?.[1];

            if (!prNumber) {
              core.warning(`Could not determine PR number from event ${context.eventName} and merge queue head_ref: ${headRef}`);
              return;
            }

            const params = {
              issue_number: Number(prNumber),
              owner,
              repo,
            };
            const headerContent = '**E2E failure report**';
            const body = [
              headerContent,
              '',
              `E2E failed for run **${RUN_NUMBER}**.`,
              '',
              `- [View workflow run](${RUN_URL})`,
              `- [Download Playwright failure report](${ARTIFACT_URL})`,
              '',
              'The report artifact contains the merged Playwright HTML report with failure videos, screenshots, and traces where available.',
            ].join('\n');
            let existingComment = null;
            for await (const { data: comments } of github.paginate.iterator(
              github.rest.issues.listComments,
              params
            )) {
              existingComment = comments.find((comment) =>
                comment.body?.includes(headerContent)
              );
              if (existingComment) break;
            }

            if (existingComment) {
              await github.rest.issues.updateComment({
                ...params,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...params,
                body,
              });
            }

  e2e-required:
    name: E2E Required
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - if: "github.event_name == 'merge_group' || contains(github.event.pull_request.body, '[x] **Run E2E tests** <!-- #e2e -->')"
        name: Enforce passing E2E workflow (in merge queue)
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "E2E tests did not pass."
            exit 1
          fi

          echo "E2E passed."
