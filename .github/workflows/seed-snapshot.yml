name: Seed Snapshot

on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: true
      version:
        type: string
        required: true
      postgres_major:
        type: string
        required: false
        default: '17'
      image:
        type: string
        required: true
      git_sha:
        type: string
        required: false
        default: ''
    secrets:
      PULUMI_ACCESS_TOKEN:
        required: true
      TAMANU_OPS_SSH:
        required: true

permissions:
  contents: read
  id-token: write

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
  PULUMI_STACK: bes/seed-snapshot/tamanu-internal-main

jobs:
  create-snapshot:
    runs-on: ubuntu-latest
    name: Seed snapshot for ${{ inputs.version }} (PG ${{ inputs.postgres_major }})
    timeout-minutes: 75
    steps:
      - name: Validate version format
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '$INPUT_VERSION' — expected X.Y.Z"
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-cd
        with:
          ops-ssh-key: ${{ secrets.TAMANU_OPS_SSH }}
          tailscale-oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID }}
          tailscale-tags: ${{ vars.TS_TAGS }}
          tailscale-k8s-operator-hostname: ${{ vars.TS_K8S_OPERATOR_HOSTNAME }}

      - name: Generate seed snapshot
        working-directory: ops/pulumi/stacks/tamanu/seed-snapshot
        run: |
          set -euo pipefail
          pulumi stack select --create "$PULUMI_STACK"
          pulumi config set version "${{ inputs.version }}"
          pulumi config set branch "${{ inputs.branch }}"
          pulumi config set image "${{ inputs.image }}"
          pulumi config set postgresMajor "${{ inputs.postgres_major }}"
          pulumi config set gitSha "${{ inputs.git_sha || github.sha }}"
          pulumi config set githubRunId "${{ github.run_id }}"
          pulumi config set githubRunAttempt "${{ github.run_attempt }}"
          pulumi up --yes --skip-preview

      - name: Cleanup ephemeral resources
        if: always()
        working-directory: ops/pulumi/stacks/tamanu/seed-snapshot
        continue-on-error: true
        run: |
          set -euo pipefail
          pulumi stack select "$PULUMI_STACK"
          pulumi destroy --yes --skip-preview
