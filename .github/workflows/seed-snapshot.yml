name: Seed Snapshot

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Release branch (e.g. release/2.1.0)'
        type: string
        required: true
      version:
        description: 'Semver version (e.g. 2.1.0)'
        type: string
        required: true
      image:
        description: 'Seed image ref (e.g. ghcr.io/beyondessential/tamanu-seed:2.1.0)'
        type: string
        required: true
      git_sha:
        description: 'Git SHA to tag the snapshot with (defaults to HEAD)'
        type: string
        required: false
        default: ''
  workflow_call:
    inputs:
      branch:
        type: string
        required: true
      version:
        type: string
        required: true
      image:
        type: string
        required: true
      git_sha:
        type: string
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  SEED_NAMESPACE: tamanu-seed

jobs:
  create-snapshot:
    runs-on: ubuntu-slim
    name: Seed snapshot for ${{ inputs.version }}
    timeout-minutes: 15
    steps:
      - name: Validate version format
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '$INPUT_VERSION' — expected X.Y.Z"
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-cd
        with:
          tailscale-oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID }}
          tailscale-tags: ${{ vars.TS_TAGS }}
          tailscale-k8s-operator-hostname: ${{ vars.TS_K8S_OPERATOR_HOSTNAME }}

      - name: Derive job name
        id: names
        run: |
          SAFE_VERSION="${{ inputs.version }}"
          SAFE_VERSION="${SAFE_VERSION//./-}"
          JOB_NAME="seed-migrate-${SAFE_VERSION}-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "job_name=${JOB_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create seed Job
        env:
          JOB_NAME: ${{ steps.names.outputs.job_name }}
          IMAGE: ${{ inputs.image }}
          VERSION: ${{ inputs.version }}
          BRANCH: ${{ inputs.branch }}
          GIT_SHA: ${{ inputs.git_sha || github.sha }}
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${SEED_NAMESPACE}
            labels:
              pgsnap.bes.au/create: "true"
            annotations:
              pgsnap.bes.au/size: "20Gi"
              pgsnap.bes.au/for-version: "${VERSION}"
              pgsnap.bes.au/source-branch: "${BRANCH}"
              pgsnap.bes.au/git-sha: "${GIT_SHA}"
          spec:
            suspend: true
            backoffLimit: 0
            activeDeadlineSeconds: 3600
            ttlSecondsAfterFinished: 3600
            template:
              spec:
                restartPolicy: Never
                tolerations:
                  - key: bes.node.purpose
                    operator: Equal
                    value: spot-workload
                    effect: NoSchedule
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: bes.node.purpose
                              operator: In
                              values: [workload]
                containers:
                  - name: migrate
                    image: ${IMAGE}
                    envFrom:
                      - secretRef:
                          name: pgsnap-${JOB_NAME}
                    resources:
                      requests:
                        cpu: 250m
                        memory: 1Gi
                      limits:
                        cpu: "1"
                        memory: 2Gi
          EOF

