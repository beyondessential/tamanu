name: Test Seed Snapshot (temporary)

on:
  push:
    branches:
      - ci/tan-2611-snapshot-creation

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ci/tan-2611-snapshot-creation

      - name: Get SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.seed
          push: true
          no-cache: true
          platforms: linux/arm64
          tags: ghcr.io/beyondessential/tamanu-seed:2.54.0
          build-args: GIT_SHA=${{ steps.sha.outputs.sha }}

  trigger:
    needs: [build]
    uses: ./.github/workflows/seed-snapshot.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    with:
      branch: release/2.54
      version: '2.54.0'
      image: ghcr.io/beyondessential/tamanu-seed:2.54.0
