name: CD

on:
  # PRs build all the time, and deploy on demand
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

  # Special issues can opt-in PR-less branches to build and deploy
  issues:
    types:
      - opened
      - edited
      - labeled

  push:
    # Release tags build the server/web/patient-portal packages only
    tags: ['v*.*.*']
    # All branches can potentially be controlled by special issues
    branches: ['**']

# makes jobs for the same thing queue behind each other, and if there is already one job pending
# (not currently running) then that job is cancelled and the newer one remains in queue.
# Pulumi ups and downs can't be safely cancelled[1] so we can't do cancel-in-progress: true
# [1]: https://github.com/pulumi/actions/issues/928
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.issue.id || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # to update the release
  packages: write # to pull and push images
  pull-requests: write # to parse PRs for config and update status
  issues: read # to parse special deploy issues
  id-token: write # OIDC token for AWS (only for release tags)


jobs:
  # This job sets everything up. It parses the run metadata, event payload, PR or issue bodies,
  # and figures out git commit hashes and refs from the actual git content, not the pseudo commit
  # github makes up for merges. Then it prepares job outputs that orchestrate the jobs that need to
  # run or not run, which can range from doing nothing to multiple deploys and undeploys at once.
  config:
    name: Workflow config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Figure branch ref and sha
        id: ref
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const cwd = '${{ github.workspace }}';
            const { parseBranchConfig } = await import(`${cwd}/packages/scripts/src/ghaCdHelpers.mjs`);
            const ref = parseBranchConfig(context);
            console.log(ref);
            return ref;

      - name: Checkout the real ref
        if: steps.ref.outputs.result != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.result }}
      - name: Find the real sha
        if: steps.ref.outputs.result != ''
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Find the control PR/issue body text
        id: control
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const cwd = '${{ github.workspace }}';
            const { findControlText } = await import(`${cwd}/packages/scripts/src/ghaCdHelpers.mjs`);
            const control = await findControlText(context, github);
            console.log('Control text length:', control?.body?.length);
            return JSON.stringify(control ?? {});

      - name: Parse deploy control config
        if: steps.ref.outputs.result != ''
        id: config
        uses: actions/github-script@v7
        env:
          REF: ${{ steps.ref.outputs.result }}
        with:
          script: |
            const cwd = '${{ github.workspace }}';
            const { parseDeployConfig } = await import(`${cwd}/packages/scripts/src/ghaCdHelpers.mjs`);

            const allDeploys = parseDeployConfig({
              ...${{ steps.control.outputs.result }},
              ref: process.env.REF,
            });
            console.log(JSON.stringify(allDeploys, null, 2));

            const matrix = ({ name, control, options }) => ({ name, control, options: JSON.stringify(options) });
            const filter = ({ options: { pause, imagesonly } }) => !pause && !imagesonly;
            const up = allDeploys.filter(deploy => deploy.enabled && filter(deploy)).map(matrix);
            const down = allDeploys.filter(deploy => !deploy.enabled && filter(deploy)).map(matrix);
            const mobile = allDeploys.filter(deploy => {
              if (deploy.options.mobile === 'always') return true;
              if (deploy.options.mobile === 'never') return false;
              return deploy.enabled && filter(deploy);
            }).map(matrix);

            console.log('Going UP', up.length);
            console.log('Going DOWN', down.length);
            console.log('Building MOBILE', mobile.length);

            core.setOutput('up', JSON.stringify(up));
            core.setOutput('down', JSON.stringify(down));
            core.setOutput('mobile', JSON.stringify(mobile));
            core.setOutput('go-up', !!up.length);
            core.setOutput('go-down', !!down.length);
            core.setOutput('go-mobile', !!mobile.length);
            core.setOutput('images', !!up.length || allDeploys.some(deploy => deploy.options.imagesonly && !deploy.options.pause));
            // arch=amd64 implies allimages: an amd64 deploy needs amd64 images built.
            core.setOutput('allimages', allDeploys.some(deploy => !deploy.options.pause && (deploy.options.allimages || deploy.options.arch === 'amd64')));

      # Autodeploys build linux/arm64 only; %allimages, %arch=amd64, or a release
      # builds the full set — linux amd64 + arm64, and the Windows VHDX jobs.
      - name: Decide build scope
        id: scope
        run: |
          if [[ ( "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ) \
                || "${{ steps.config.outputs.allimages }}" == "true" ]]; then
            echo 'all=true' >> "$GITHUB_OUTPUT"
            echo 'platforms=[{"arch":"amd64","runs-on":"ubuntu-24.04"},{"arch":"arm64","runs-on":"ubuntu-24.04-arm"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'all=false' >> "$GITHUB_OUTPUT"
            echo 'platforms=[{"arch":"arm64","runs-on":"ubuntu-24.04-arm"}]' >> "$GITHUB_OUTPUT"
          fi

      - name: Check the images exist
        id: check-images-exist
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || steps.config.outputs.images == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
          # Check the arch that distinguishes the current scope: amd64 exists only
          # if the full set was already built, so widening the scope (%allimages)
          # after an arm64-only run still rebuilds.
          arch='${{ steps.scope.outputs.all == 'true' && 'amd64' || 'arm64' }}'
          for repo in central facility frontend patient-portal; do
            if skopeo inspect docker://ghcr.io/beyondessential/tamanu-$repo:sha-${{ steps.sha.outputs.sha }}.$arch >/dev/null 2>&1; then
              echo "$repo $arch image found, assuming existence"
              echo exist=yes | tee -a $GITHUB_OUTPUT
              exit
            else
              echo "$repo $arch image not found"
            fi
          done
          echo exist=no | tee -a $GITHUB_OUTPUT
    outputs:
      ref: ${{ steps.ref.outputs.result }}
      sha: ${{ steps.sha.outputs.sha }}
      up: ${{ steps.config.outputs.up }}
      down: ${{ steps.config.outputs.down }}
      mobile: ${{ steps.config.outputs.mobile }}
      go-up: ${{ steps.config.outputs.go-up == 'true' }}
      go-down: ${{ steps.config.outputs.go-down == 'true' }}
      go-mobile: ${{ steps.config.outputs.go-mobile == 'true' }}

      # whether to build the full image set (amd64 + Windows VHDX), vs arm64 only
      all-images: ${{ steps.scope.outputs.all }}
      # platform matrix for the images job
      platforms: ${{ steps.scope.outputs.platforms }}

      # we need to build images when:
      # - we want to bring deploys up, AND the images for this commit don't yet exist, or
      # - we want to build images only, AND the images for this commit don't yet exist, or
      # - we're doing a release, because images are both a product and how we make other artifacts.
      build-images: ${{ ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || steps.config.outputs.images == 'true') && steps.check-images-exist.outputs.exist != 'yes' }}

  images:
    needs: config
    if: needs.config.outputs.build-images == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.config.outputs.platforms) }}
        package:
          - name: central
            path: central-server
            target: server
          - name: facility
            path: facility-server
            target: server
          - name: frontend
            path: web
            target: frontend
          - name: patient-portal
            path: patient-portal
            target: patient-portal

    name: Image for ${{ matrix.package.name }} on ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Install docker (arm64 beta)
        if: matrix.platform.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl acl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update

          sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          sudo usermod -aG docker $USER
          sudo setfacl --modify user:$USER:rw /var/run/docker.sock

      - name: Verify docker works
        run: docker run hello-world

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.ref }}

      - name: Extract version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Setup buildkit
        uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/beyondessential/tamanu-${{ matrix.package.name }}
          tags: |
            type=semver,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }},value=v${{ steps.version.outputs.version }},pattern=v{{version}}.${{ matrix.platform.arch }}
            type=semver,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }},value=v${{ steps.version.outputs.version }},pattern=v{{major}}.{{minor}}.${{ matrix.platform.arch }}
            type=semver,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }},value=v${{ steps.version.outputs.version }},pattern=v{{major}}.${{ matrix.platform.arch }}
            sha-${{ needs.config.outputs.sha }}.${{ matrix.platform.arch }}
            type=raw,value=latest,enable=false
          labels: |
            org.opencontainers.image.vendor=BES International
            org.opencontainers.image.title=Tamanu ${{ matrix.package.name }}
            org.opencontainers.image.url=https://www.bes.au/products/tamanu/
            org.opencontainers.image.source=https://github.com/beyondessential/tamanu/
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ matrix.platform.arch }}-${{ needs.config.outputs.ref }}-${{ matrix.package.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform.arch }}-${{ needs.config.outputs.ref }}-${{ matrix.package.name }}
          build-args: PACKAGE_PATH=${{ matrix.package.path }}
          target: ${{ matrix.package.target }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
    outputs:
      version: ${{ steps.version.outputs.version }}

  # Windows-native release VHDXs, packed as OCI artifacts in ghcr.io and folded
  # into the multi-arch manifest, built in parallel with the linux images.
  windows-vhdx:
    needs:
      - config
    if: needs.config.outputs.build-images == 'true' && needs.config.outputs.all-images == 'true'
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: central
            path: central-server
          - name: facility
            path: facility-server
    name: Windows VHDX for ${{ matrix.package.name }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Extract version
        shell: bash
        run: echo "VERSION=$(jq -r .version package.json)" >> "$GITHUB_ENV"

      # Build off the VHDX: a dynamic VHDX keeps blocks the reduction deletes
      # allocated and unzeroed, which inflates the image.
      - name: Stage source (workspace)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path release) { Remove-Item -Recurse -Force release }
          New-Item -ItemType Directory -Force -Path release | Out-Null
          robocopy . release /E /XD .git node_modules release oras-bin /XF *.vhdx *.zip /R:2 /W:2 /NFL /NDL /NJH /NJS /NP | Out-Null
          if ($LASTEXITCODE -ge 8) { throw "robocopy staging failed ($LASTEXITCODE)" }
          $global:LASTEXITCODE = 0

      - name: Build reduced source (Windows-native)
        shell: bash
        run: |
          set -euxo pipefail
          cd release
          bash scripts/docker-build.sh '${{ matrix.package.path }}'

      - name: Embed Windows Node runtime
        shell: bash
        run: scripts/embed-node-runtime.sh win-x64 release

      - name: Build VHDX (format + copy)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vhdx = "tamanu-${{ matrix.package.name }}-$env:VERSION-windows-amd64.vhdx"
          "VHDX_PATH=$vhdx" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          scripts\build-windows-vhdx.ps1 -ReleaseDir release -Output $vhdx -Label "Tamanu-${{ matrix.package.name }}"

      - name: Pack VHDX artifact
        uses: ./.github/actions/vhdx-pack
        with:
          package: ${{ matrix.package.name }}
          package-path: ${{ matrix.package.path }}
          kind: server
          root-dir: release
          version: ${{ env.VERSION }}
          sha: ${{ needs.config.outputs.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Frontend VHDXs (web / patient-portal): built dist plus the Windows Caddy
  # binary and Caddyfile, self-contained like the linux frontend container.
  windows-vhdx-frontend:
    needs:
      - config
    if: needs.config.outputs.build-images == 'true' && needs.config.outputs.all-images == 'true'
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: frontend
            path: web
          - name: patient-portal
            path: patient-portal
    name: Frontend VHDX for ${{ matrix.package.name }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Extract version
        shell: bash
        run: echo "VERSION=$(jq -r .version package.json)" >> "$GITHUB_ENV"

      - name: Build frontend (Windows-native)
        shell: bash
        run: bash scripts/docker-build.sh '${{ matrix.package.path }}'

      - name: Assemble bundle (dist + Windows Caddy)
        shell: bash
        run: |
          set -euxo pipefail
          stage='tamanu-${{ matrix.package.name }}'
          mkdir -p "$stage/app"
          cp -r "packages/${{ matrix.package.path }}/dist/." "$stage/app"

          caddy_version="$(curl -fsSL https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r .tag_name | sed 's/^v//')"
          curl -fsSL -o caddy.zip \
            "https://github.com/caddyserver/caddy/releases/download/v${caddy_version}/caddy_${caddy_version}_windows_amd64.zip"
          unzip -o caddy.zip caddy.exe -d "$stage"
          rm caddy.zip

          # serve from the bundle-relative ./app rather than the container's /app
          sed -E 's|root \* /app|root * app|' \
            "packages/${{ matrix.package.path }}/Caddyfile.docker" > "$stage/Caddyfile"

      - name: Build VHDX (format + copy)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vhdx = "tamanu-${{ matrix.package.name }}-$env:VERSION-windows-amd64.vhdx"
          "VHDX_PATH=$vhdx" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          scripts\build-windows-vhdx.ps1 -ReleaseDir 'tamanu-${{ matrix.package.name }}' -Output $vhdx -Label "Tamanu-${{ matrix.package.name }}"

      - name: Pack VHDX artifact
        uses: ./.github/actions/vhdx-pack
        with:
          package: ${{ matrix.package.name }}
          package-path: ${{ matrix.package.path }}
          kind: frontend
          root-dir: tamanu-${{ matrix.package.name }}
          version: ${{ env.VERSION }}
          sha: ${{ needs.config.outputs.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  multi-arch:
    needs:
      - config
      - images
      - windows-vhdx
      - windows-vhdx-frontend
    # always() so a failure/skip of the windows-vhdx jobs never blocks publishing
    # the linux multi-arch manifest; the VHDX entry is added opportunistically
    # below only when its artifact manifest exists.
    if: always() && needs.images.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        repo:
          - central
          - facility
          - frontend
          - patient-portal

    runs-on: ubuntu-latest
    name: Multi-arch for ${{ matrix.repo }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-manifest-tool
      - uses: ./.github/actions/setup-oras
      - name: Combine images
        run: |
          set -euxo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u '${{ github.actor }}' --password-stdin
          image="ghcr.io/beyondessential/tamanu-${{ matrix.repo }}"
          sha="sha-${{ needs.config.outputs.sha }}"
          vhdx_type="application/vnd.au.bes.seedling.windows-vhdx.v1+zstd"

          # The Windows VHDX artifact exists for the servers (windows-vhdx*) and
          # the frontends (windows-vhdx-frontend), but only when that job
          # succeeded. Detect it rather than assume it.
          vhdx_ref=""
          if oras manifest fetch --descriptor "$image:$sha.windows-vhdx" >/dev/null 2>&1; then
            vhdx_ref="$image:$sha.windows-vhdx"
          fi

          # Publish the linux multi-arch index. Fails the job if it can't (this is
          # the essential product); the VHDX append below is best-effort.
          retag() {
            manifest-tool push from-args \
              --platforms ${{ needs.config.outputs.all-images == 'true' && 'linux/amd64,linux/arm64' || 'linux/arm64' }} \
              --template "$image:$1.ARCH" \
              --target "$image:$1"
          }

          # Append the VHDX as an extra index entry with an unknown/unknown
          # platform (like buildkit attestations), so container runtimes never
          # select it while a BES client can discover it by artifactType.
          index_type="application/vnd.oci.image.index.v1+json"
          append_vhdx() {
            target="$1"
            [ -n "$vhdx_ref" ] || return 0
            desc="$(oras manifest fetch --descriptor "$vhdx_ref")"
            idx="$(oras manifest fetch "$image:$target")"
            aug="$(jq \
              --arg at "$vhdx_type" \
              --arg pkg "${{ matrix.repo }}" \
              '{
                 mediaType: .mediaType,
                 digest: .digest,
                 size: .size,
                 artifactType: $at,
                 platform: { architecture: "unknown", os: "unknown" },
                 annotations: {
                   "au.bes.tamanu.artifact": "windows-vhdx",
                   "au.bes.tamanu.package": $pkg,
                   "org.opencontainers.image.title": ("Tamanu " + $pkg + " (Windows VHDX)")
                 }
               }' <<<"$desc")"
            # Normalise to an OCI image index so a BES artifact entry (with
            # artifactType) is schema-valid, then re-push the tag.
            jq --argjson d "$aug" --arg mt "$index_type" \
              '.mediaType = $mt
               | .manifests |= (map(select(.digest != $d.digest)) + [$d])' <<<"$idx" \
              | oras manifest push --media-type "$index_type" "$image:$target" -
          }

          process() { retag "$1"; append_vhdx "$1" || echo "VHDX append skipped for $1"; }

          process "$sha"

          # quit now if we're not releasing
          # we can't have an empty string in the continue case because that's interpreted as falsy and writes 'exit'
          ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && '# continue' || 'exit' }}

          process v$(jq -r '.version' package.json)
          process v$(jq -r '.version | split(".") | .[0:2] | join(".")' package.json)
          process v$(jq -r '.version | split(".") | .[0]' package.json)

  deploy-up:
    needs:
      - config
      - multi-arch
    # If we're deploying (go-up):
    # - and we're building images (build-images), we need them (multi-arch) to succeed
    # - or if we're not building images, we need to ignore that multi-arch was skipped
    #
    # always() is how github actions knows to run this job even if a `needs` job failed/didn't run
    if: always() && needs.config.outputs.go-up == 'true' && (needs.config.outputs.build-images == 'false' || needs.multi-arch.result == 'success')

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.up) }}
    name: Deploy ${{ matrix.name }}
    uses: ./.github/workflows/cd-up.yml
    with:
      deploy-name: ${{ matrix.name }}
      options: ${{ matrix.options }}
      control: ${{ matrix.control }}
      image-tag: sha-${{ needs.config.outputs.sha }}
      ref: ${{ needs.config.outputs.ref }}
    secrets:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      TAMANU_OPS_SSH: ${{ secrets.TAMANU_OPS_SSH }}

  deploy-down:
    needs: config
    if: needs.config.outputs.go-down == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.down) }}
    name: Undeploy ${{ matrix.name }}
    uses: ./.github/workflows/cd-down.yml
    with:
      ref: ${{ needs.config.outputs.ref }}
      deploy-name: ${{ matrix.name }}
      options: ${{ matrix.options }}
    secrets:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      TAMANU_OPS_SSH: ${{ secrets.TAMANU_OPS_SSH }}

  fake-data:
    needs:
      - config
      - deploy-up
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.up) }}
    name: Add fake data to ${{ matrix.name }}
    uses: ./.github/workflows/cd-fake-data.yml
    with:
      deploy-name: ${{ matrix.name }}
      options: ${{ matrix.options }}

  package-android-test:
    needs: config
    if: needs.config.outputs.go-mobile == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.mobile) }}
    name: Package test Android for ${{ matrix.name }}
    uses: ./.github/workflows/cd-package-android.yml
    with:
      server: central.${{ matrix.name }}.cd.tamanu.app
      ref: ${{ needs.config.outputs.ref }}
      branding: ${{ fromJson(matrix.options).branding }}
      # Test builds are for QA on physical (arm64) devices, so only compile that
      # ABI. Avoids the New Architecture C++/CMake compile running once per ABI;
      # release builds (below) still produce all ABIs.
      architectures: arm64-v8a
    secrets:
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}

  # The package-* jobs below are only triggered by tags, so we can assume that
  # github.ref and github.ref_name are set and correct.

  package-frontends:
    needs: images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Package Frontends (web and patient portal) ${{ github.ref_name }}
    uses: ./.github/workflows/cd-package-frontend.yml
    secrets:
      META_CERT: ${{ secrets.META_CERT }}
      META_KEY: ${{ secrets.META_KEY }}

  package-servers:
    needs: images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Package Servers ${{ github.ref_name }}
    uses: ./.github/workflows/cd-package-servers.yml
    secrets:
      META_CERT: ${{ secrets.META_CERT }}
      META_KEY: ${{ secrets.META_KEY }}

  package-android-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Package release Android ${{ github.ref_name }}
    uses: ./.github/workflows/cd-package-android.yml
    secrets:
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      META_CERT: ${{ secrets.META_CERT }}
      META_KEY: ${{ secrets.META_KEY }}

  release-notes-images:
    needs:
      - config
      - multi-arch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Append image names to release notes
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          append_body: true
          body: |
            ## Container images 🚢

            | Repository | Tag |
            |:-----------|:---:|
            | `ghcr.io/beyondessential/tamanu-central` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-central/${{ github.ref_name }}) |
            | `ghcr.io/beyondessential/tamanu-facility` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-facility/${{ github.ref_name }}) |
            | `ghcr.io/beyondessential/tamanu-frontend` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-frontend/${{ github.ref_name }}) |
            | `ghcr.io/beyondessential/tamanu-patient-portal` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-patient-portal/${{ github.ref_name }}) |

      - name: Post to meta
        continue-on-error: true
        run: |
          cat << EOF > ./meta.crt
          ${{ secrets.META_CERT }}
          EOF
          cat << EOF > ./meta.key
          ${{ secrets.META_KEY }}
          EOF

          version=$(echo "${{ github.ref_name }}" | sed -E 's/^v//')

          for image in central facility frontend patient-portal; do
            set -x
            curl -v "${{ vars.META_URL }}/artifacts/$version/$image/container" \
              -E meta.crt --key meta.key \
              --data-binary "oci://ghcr.io/beyondessential/tamanu-$image:${{ github.ref_name }}"
          done
