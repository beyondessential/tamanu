name: CD

on:
  # PRs build all the time, and deploy on demand
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

  # Special issues can opt-in PR-less branches to build and deploy
  issues:
    types:
      - opened
      - edited
      - labeled

  push:
    # Release tags build the server/web/patient-portal packages only
    tags: ['v*.*.*']
    # All branches can potentially be controlled by special issues
    branches: ['**']

# makes jobs for the same thing queue behind each other, and if there is already one job pending
# (not currently running) then that job is cancelled and the newer one remains in queue.
# Pulumi ups and downs can't be safely cancelled[1] so we can't do cancel-in-progress: true
# [1]: https://github.com/pulumi/actions/issues/928
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.issue.id || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # to update the release
  packages: write # to pull and push images
  pull-requests: write # to parse PRs for config and update status
  issues: read # to parse special deploy issues
  id-token: write # OIDC token for AWS (only for release tags)


jobs:
  # This job sets everything up. It parses the run metadata, event payload, PR or issue bodies,
  # and figures out git commit hashes and refs from the actual git content, not the pseudo commit
  # github makes up for merges. Then it prepares job outputs that orchestrate the jobs that need to
  # run or not run, which can range from doing nothing to multiple deploys and undeploys at once.
  config:
    name: Workflow config
    runs-on: ubuntu-latest
    steps:
      - name: Mark CD start
        id: cdstart
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
      - name: Figure branch ref and sha
        id: ref
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const cwd = '${{ github.workspace }}';
            const { parseBranchConfig } = await import(`${cwd}/packages/scripts/src/ghaCdHelpers.mjs`);
            const ref = parseBranchConfig(context);
            console.log(ref);
            return ref;

      - name: Checkout the real ref
        if: steps.ref.outputs.result != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.result }}
      - name: Find the real sha
        if: steps.ref.outputs.result != ''
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Find the control PR/issue body text
        id: control
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const cwd = '${{ github.workspace }}';
            const { findControlText } = await import(`${cwd}/packages/scripts/src/ghaCdHelpers.mjs`);
            const control = await findControlText(context, github);
            console.log('Control text length:', control?.body?.length);
            return JSON.stringify(control ?? {});

      - name: Parse deploy control config
        if: steps.ref.outputs.result != ''
        id: config
        uses: actions/github-script@v7
        env:
          REF: ${{ steps.ref.outputs.result }}
        with:
          script: |
            const cwd = '${{ github.workspace }}';
            const { parseDeployConfig } = await import(`${cwd}/packages/scripts/src/ghaCdHelpers.mjs`);

            const allDeploys = parseDeployConfig({
              ...${{ steps.control.outputs.result }},
              ref: process.env.REF,
            });
            console.log(JSON.stringify(allDeploys, null, 2));

            const matrix = ({ name, control, options }) => ({ name, control, options: JSON.stringify(options) });
            const filter = ({ options: { pause, imagesonly } }) => !pause && !imagesonly;
            const up = allDeploys.filter(deploy => deploy.enabled && filter(deploy)).map(matrix);
            const down = allDeploys.filter(deploy => !deploy.enabled && filter(deploy)).map(matrix);
            const mobile = allDeploys.filter(deploy => {
              if (deploy.options.mobile === 'always') return true;
              if (deploy.options.mobile === 'never') return false;
              return deploy.enabled && filter(deploy);
            }).map(matrix);

            console.log('Going UP', up.length);
            console.log('Going DOWN', down.length);
            console.log('Building MOBILE', mobile.length);

            core.setOutput('up', JSON.stringify(up));
            core.setOutput('down', JSON.stringify(down));
            core.setOutput('mobile', JSON.stringify(mobile));
            core.setOutput('go-up', !!up.length);
            core.setOutput('go-down', !!down.length);
            core.setOutput('go-mobile', !!mobile.length);
            core.setOutput('images', !!up.length || allDeploys.some(deploy => deploy.options.imagesonly && !deploy.options.pause));

      - name: Check the images exist
        id: check-images-exist
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || steps.config.outputs.images == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
          for repo in central facility frontend patient-portal; do
            if skopeo inspect docker://ghcr.io/beyondessential/tamanu-$repo:sha-${{ steps.sha.outputs.sha }} 2>&1 >/dev/null; then
              jq -c . <<< "$desc" # check that it's valid JSON
              echo $repo image found, assuming existence
              echo exist=yes | tee -a $GITHUB_OUTPUT
              exit
            else
              echo $repo image not found
            fi
          done
          echo exist=no | tee -a $GITHUB_OUTPUT
    outputs:
      ref: ${{ steps.ref.outputs.result }}
      sha: ${{ steps.sha.outputs.sha }}
      cd-start: ${{ steps.cdstart.outputs.epoch }}
      up: ${{ steps.config.outputs.up }}
      down: ${{ steps.config.outputs.down }}
      mobile: ${{ steps.config.outputs.mobile }}
      go-up: ${{ steps.config.outputs.go-up == 'true' }}
      go-down: ${{ steps.config.outputs.go-down == 'true' }}
      go-mobile: ${{ steps.config.outputs.go-mobile == 'true' }}

      # we need to build images when:
      # - we want to bring deploys up, AND the images for this commit don't yet exist, or
      # - we want to build images only, AND the images for this commit don't yet exist, or
      # - we're doing a release, because images are both a product and how we make other artifacts.
      build-images: ${{ ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || steps.config.outputs.images == 'true') && steps.check-images-exist.outputs.exist != 'yes' }}

  images:
    needs: config
    if: needs.config.outputs.build-images == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
        package:
          - name: central
            path: central-server
            target: server
          - name: facility
            path: facility-server
            target: server
          - name: frontend
            path: web
            target: frontend
          - name: patient-portal
            path: patient-portal
            target: patient-portal

    name: Image for ${{ matrix.package.name }} on ${{ matrix.platform.arch }}
    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Install docker (arm64 beta)
        if: matrix.platform.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl acl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update

          sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          sudo usermod -aG docker $USER
          sudo setfacl --modify user:$USER:rw /var/run/docker.sock

      - name: Verify docker works
        run: docker run hello-world

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.ref }}

      - name: Extract version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Setup buildkit
        uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/beyondessential/tamanu-${{ matrix.package.name }}
          tags: |
            type=semver,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }},value=v${{ steps.version.outputs.version }},pattern=v{{version}}.${{ matrix.platform.arch }}
            type=semver,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }},value=v${{ steps.version.outputs.version }},pattern=v{{major}}.{{minor}}.${{ matrix.platform.arch }}
            type=semver,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }},value=v${{ steps.version.outputs.version }},pattern=v{{major}}.${{ matrix.platform.arch }}
            sha-${{ needs.config.outputs.sha }}.${{ matrix.platform.arch }}
            type=raw,value=latest,enable=false
          labels: |
            org.opencontainers.image.vendor=BES International
            org.opencontainers.image.title=Tamanu ${{ matrix.package.name }}
            org.opencontainers.image.url=https://www.bes.au/products/tamanu/
            org.opencontainers.image.source=https://github.com/beyondessential/tamanu/
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.platform.arch }}
          cache-from: type=gha,scope=${{ matrix.platform.arch }}-${{ needs.config.outputs.ref }}-${{ matrix.package.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform.arch }}-${{ needs.config.outputs.ref }}-${{ matrix.package.name }}
          build-args: PACKAGE_PATH=${{ matrix.package.path }}
          target: ${{ matrix.package.target }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
    outputs:
      version: ${{ steps.version.outputs.version }}

  # Experimental: build a *Windows-native* server release (native `npm install`
  # on a Windows runner), capture it as an NTFS VHDX disk image, and pack the
  # VHDX as an OCI artifact in ghcr.io so it can be pulled efficiently and folded
  # into the multi-arch manifest we already generate.
  #
  # The goal is to answer "does Tamanu actually run from this VHDX on our target
  # Windows systems?" — so the bundle must have Windows-native node_modules, not
  # linux ones. We reuse the same bundle-sourcing as cd-package-servers.yml: the
  # linux prep job extracts /app from the freshly-built amd64 image and strips
  # node_modules; the Windows job reinstalls them natively.
  #
  # Runs on the same build-images trigger as the linux `images` job, so it builds
  # for any PR/branch via the imagesonly deploy option — no release tag needed.

  # Linux prep: extract the app tree from the built image and hand it to Windows.
  windows-vhdx-prep:
    needs:
      - config
      - images
    if: needs.config.outputs.build-images == 'true'
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: central
            path: central-server
          - name: facility
            path: facility-server
    name: Prep Windows bundle for ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.ref }}

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - name: Pull image
        run: docker pull ghcr.io/beyondessential/tamanu-${{ matrix.package.name }}:sha-${{ needs.config.outputs.sha }}.amd64

      - name: Extract version from image
        id: version
        run: |
          docker image inspect ghcr.io/beyondessential/tamanu-${{ matrix.package.name }}:sha-${{ needs.config.outputs.sha }}.amd64 \
            | jq '"version=\(.[0] | .Config.Labels["org.opencontainers.image.version"])"' -r | tee -a "$GITHUB_OUTPUT"

      - name: Extract files from image
        run: |
          set -x
          docker create --name working ghcr.io/beyondessential/tamanu-${{ matrix.package.name }}:sha-${{ needs.config.outputs.sha }}.amd64
          docker cp working:/app release-v${{ steps.version.outputs.version }}
          docker rm working

      # Mirror cd-package-servers.yml: point pm2's cwd at the target package.
      - name: Prepare production configuration
        run: |
          set -x
          sed -E \
            "s|const cwd =.+|const cwd = 'packages/${{ matrix.package.path }}';|" \
            packages/${{ matrix.package.path }}/pm2.config.cjs \
          > release-v${{ steps.version.outputs.version }}/pm2.config.cjs

      - name: Strip linux node_modules and zip for the Windows job
        run: |
          set -x
          pushd 'release-v${{ steps.version.outputs.version }}'
          rm -rfv node_modules packages/*/node_modules
          popd
          zip -r 'release-v${{ steps.version.outputs.version }}.zip' \
            'release-v${{ steps.version.outputs.version }}'

      - name: Upload bundle for the Windows job
        uses: actions/upload-artifact@v4
        with:
          name: winvhdxjob-${{ matrix.package.name }}-${{ steps.version.outputs.version }}
          path: release-v${{ steps.version.outputs.version }}.zip
          retention-days: 1
          if-no-files-found: error
          compression-level: 0
    outputs:
      version: ${{ steps.version.outputs.version }}

  # Windows-native build + VHDX capture + OCI push.
  windows-vhdx:
    needs:
      - config
      - windows-vhdx-prep
    if: needs.config.outputs.build-images == 'true'
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: central
            path: central-server
          - name: facility
            path: facility-server
    name: Windows VHDX for ${{ matrix.package.name }}
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.windows-vhdx-prep.outputs.version }}
      # BES-specific artifact type so this is never mistaken for a runnable
      # container image by a Windows container runtime.
      VHDX_ARTIFACT_TYPE: application/vnd.au.bes.tamanu.windows-vhdx.v1+zstd
      # --- Experiment knobs (flip per experiment; see PR description) ---------
      # variant is just a label used in the measurement comment.
      EXPERIMENT_VARIANT: baseline
      VHDX_FILESYSTEM: NTFS   # NTFS | ReFS
      VHDX_COMPRESS: 'false'  # 'true' enables transparent FS compression (NTFS)
    steps:
      - name: Mark job start
        shell: bash
        run: echo "WINDOWS_JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.config.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Download prepared bundle
        uses: actions/download-artifact@v4
        with:
          name: winvhdxjob-${{ matrix.package.name }}-${{ env.VERSION }}

      - name: Unzip bundle
        shell: bash
        run: |
          unzip -q release-v${VERSION}.zip
          # phase marker: end of setup+fetch (checkout, node, download, unzip)
          echo "TS_SETUP=$(date +%s)" >> "$GITHUB_ENV"

      # The whole point: install node_modules natively on Windows.
      #
      # Mirror docker-build.sh: do a *full* install (devDeps included) so the
      # root `prepare` script (patch-package) can run, then prune to production.
      # npm runs lifecycle scripts through cmd.exe on Windows by default, which
      # can't parse the shell-syntax `prepare` script, so force bash (present as
      # Git bash) as the script shell.
      - name: Reinstall dependencies (Windows-native)
        shell: bash
        run: |
          cd "release-v${VERSION}"
          npm install --package-lock --script-shell bash
          npm prune --omit=dev
          echo "TS_NPM=$(date +%s)" >> "$GITHUB_ENV"

      - name: Embed Windows Node runtime
        shell: bash
        run: |
          scripts/embed-node-runtime.sh win-x64 "release-v${VERSION}"
          echo "TS_EMBED=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build VHDX (native diskpart)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vhdx = "tamanu-${{ matrix.package.name }}-$env:VERSION-windows-amd64.vhdx"
          $compress = ($env:VHDX_COMPRESS -eq 'true')
          scripts\build-windows-vhdx.ps1 `
            -ReleaseDir  "release-v$env:VERSION" `
            -Output      $vhdx `
            -Label       "Tamanu-${{ matrix.package.name }}" `
            -Filesystem  $env:VHDX_FILESYSTEM `
            -Compress:$compress
          # Record the raw (on-disk) VHDX size before compression removes it.
          $raw = (Get-Item $vhdx).Length
          "VHDX_RAW_BYTES=$raw" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TS_BUILD=$([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compress VHDX
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install zstandard --no-progress -y
          # refresh PATH so zstd is visible in this session
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          $vhdx = "tamanu-${{ matrix.package.name }}-$env:VERSION-windows-amd64.vhdx"
          zstd --rm -T0 -19 $vhdx
          $zst = (Get-Item "$vhdx.zst").Length
          "VHDX_ZST_BYTES=$zst" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TS_ZSTD=$([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install oras
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '1.2.0'
          Invoke-WebRequest -Uri "https://github.com/oras-project/oras/releases/download/v$ver/oras_${ver}_windows_amd64.zip" -OutFile oras.zip
          Expand-Archive -Path oras.zip -DestinationPath oras-bin -Force
          "$PWD\oras-bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & "$PWD\oras-bin\oras.exe" version

      - name: Push VHDX as a BES OCI artifact
        shell: bash
        run: |
          set -euxo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u '${{ github.actor }}' --password-stdin
          image="ghcr.io/beyondessential/tamanu-${{ matrix.package.name }}"
          tag="sha-${{ needs.config.outputs.sha }}.windows-vhdx"
          vhdx="tamanu-${{ matrix.package.name }}-${VERSION}-windows-amd64.vhdx.zst"

          # --artifact-type marks this as a BES artifact (empty scratch config,
          # no os/arch), so it is not a runnable image manifest. It slots into
          # the index below with an unknown/unknown platform, which container
          # runtimes deliberately never select.
          oras push "$image:$tag" \
            --artifact-type "$VHDX_ARTIFACT_TYPE" \
            --annotation "org.opencontainers.image.title=Tamanu ${{ matrix.package.name }} (Windows VHDX)" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            --annotation "org.opencontainers.image.source=https://github.com/beyondessential/tamanu/" \
            --annotation "org.opencontainers.image.vendor=BES International" \
            --annotation "org.opencontainers.image.licenses=GPL-3.0-or-later" \
            --annotation "au.bes.tamanu.package=${{ matrix.package.name }}" \
            --annotation "au.bes.tamanu.os=windows" \
            --annotation "au.bes.tamanu.arch=amd64" \
            "$vhdx:$VHDX_ARTIFACT_TYPE"

          # Total pushed size = sum of layer sizes + config + manifest.
          manifest="$(oras manifest fetch "$image:$tag")"
          registry_bytes="$(jq '[.layers[].size] + [.config.size] + [(. | tostring | length)] | add' <<<"$manifest")"

          # Timings: whole CD process (config job start -> upload), this job
          # alone, and each build phase (raw per-step build time).
          cd_start="${{ needs.config.outputs.cd-start }}"
          now="$(date +%s)"
          total_elapsed=$(( now - cd_start ))
          js="${WINDOWS_JOB_START:-$now}"
          windows_elapsed=$(( now - js ))
          # per-phase deltas (guard against missing markers on early failure)
          setup_s=$(( ${TS_SETUP:-$js} - js ))
          npm_s=$(( ${TS_NPM:-0} - ${TS_SETUP:-0} ))
          embed_s=$(( ${TS_EMBED:-0} - ${TS_NPM:-0} ))
          build_s=$(( ${TS_BUILD:-0} - ${TS_EMBED:-0} ))
          compress_s=$(( ${TS_ZSTD:-0} - ${TS_BUILD:-0} ))
          upload_s=$(( now - ${TS_ZSTD:-$now} ))

          jq -n \
            --arg package "${{ matrix.package.name }}" \
            --arg variant "$EXPERIMENT_VARIANT" \
            --arg filesystem "$VHDX_FILESYSTEM" \
            --arg compression "$VHDX_COMPRESS" \
            --argjson raw "${VHDX_RAW_BYTES:-0}" \
            --argjson compressed "${VHDX_ZST_BYTES:-0}" \
            --argjson registry "${registry_bytes:-0}" \
            --argjson total "$total_elapsed" \
            --argjson windows "$windows_elapsed" \
            --argjson setup "$setup_s" \
            --argjson npm "$npm_s" \
            --argjson embed "$embed_s" \
            --argjson build "$build_s" \
            --argjson compress "$compress_s" \
            --argjson upload "$upload_s" \
            --arg tag "$tag" \
            '{package:$package, variant:$variant, filesystem:$filesystem,
              compression:$compression, vhdxRawBytes:$raw,
              vhdxCompressedBytes:$compressed, registryBytes:$registry,
              totalElapsedSeconds:$total, windowsElapsedSeconds:$windows,
              phases:{ setupFetch:$setup, npmInstall:$npm, embedNode:$embed,
                       buildVhdx:$build, compress:$compress, upload:$upload },
              tag:$tag}' \
            > "metrics-${{ matrix.package.name }}.json"
          cat "metrics-${{ matrix.package.name }}.json"

      - name: Upload experiment metrics
        uses: actions/upload-artifact@v4
        with:
          name: vhdx-metrics-${{ matrix.package.name }}
          path: metrics-${{ matrix.package.name }}.json
          retention-days: 15
          if-no-files-found: error
    outputs:
      version: ${{ needs.windows-vhdx-prep.outputs.version }}

  # Collect the per-package metrics and post them as a PR comment, one comment
  # per experiment run, so we build up a record of size + time across variants.
  windows-vhdx-report:
    needs:
      - config
      - windows-vhdx
    if: always() && github.event_name == 'pull_request' && needs.windows-vhdx.result != 'skipped'
    runs-on: ubuntu-latest
    name: Report VHDX experiment metrics
    steps:
      - name: Download metrics
        uses: actions/download-artifact@v4
        with:
          pattern: vhdx-metrics-*
          merge-multiple: true
          path: metrics

      - name: Build comment
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(metrics/metrics-*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no metrics files; windows-vhdx likely failed before upload" >&2
            echo "SKIP_COMMENT=true" >> "$GITHUB_ENV"
            exit 0
          fi

          mib() { awk -v b="$1" 'BEGIN{ if(b=="null"||b==""){b=0}; printf "%.1f", b/1048576 }'; }
          hms() { awk -v s="$1" 'BEGIN{ printf "%d:%02d", int(s/60), s%60 }'; }

          variant="$(jq -r '.variant' "${files[0]}")"
          filesystem="$(jq -r '.filesystem' "${files[0]}")"
          compression="$(jq -r '.compression' "${files[0]}")"

          {
            echo "## Windows VHDX experiment — \`$variant\`"
            echo
            echo "- Filesystem: **$filesystem**  |  Compression: **$compression**"
            echo "- Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})  |  commit \`${{ needs.config.outputs.sha }}\`"
            echo
            echo "### Size &amp; total time"
            echo
            echo "| Package | VHDX raw (MiB) | Uploaded zst (MiB) | Registry total (MiB) | CD→upload (mm:ss) | Windows job (mm:ss) |"
            echo "|:--|--:|--:|--:|--:|--:|"
            for f in "${files[@]}"; do
              pkg="$(jq -r '.package' "$f")"
              raw="$(mib "$(jq -r '.vhdxRawBytes' "$f")")"
              zst="$(mib "$(jq -r '.vhdxCompressedBytes' "$f")")"
              reg="$(mib "$(jq -r '.registryBytes' "$f")")"
              tot="$(hms "$(jq -r '.totalElapsedSeconds' "$f")")"
              win="$(hms "$(jq -r '.windowsElapsedSeconds' "$f")")"
              echo "| $pkg | $raw | $zst | $reg | $tot | $win |"
            done
            echo
            echo "### Per-step build time (mm:ss)"
            echo
            echo "| Package | setup+fetch | npm install | embed node | build VHDX | compress | upload |"
            echo "|:--|--:|--:|--:|--:|--:|--:|"
            for f in "${files[@]}"; do
              pkg="$(jq -r '.package' "$f")"
              s="$(hms "$(jq -r '.phases.setupFetch' "$f")")"
              n="$(hms "$(jq -r '.phases.npmInstall' "$f")")"
              e="$(hms "$(jq -r '.phases.embedNode' "$f")")"
              b="$(hms "$(jq -r '.phases.buildVhdx' "$f")")"
              c="$(hms "$(jq -r '.phases.compress' "$f")")"
              u="$(hms "$(jq -r '.phases.upload' "$f")")"
              echo "| $pkg | $s | $n | $e | $b | $c | $u |"
            done
            echo
            echo "_CD→upload is measured from workflow start to the VHDX upload completing, so it includes the linux image build feeding the bundle. setup+fetch is measured from the start of the Windows job (checkout, node setup, artifact download, unzip)._"
          } > comment.md
          cat comment.md

      - name: Post comment
        if: env.SKIP_COMMENT != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  multi-arch:
    needs:
      - config
      - images
      - windows-vhdx
    # always() so a failure/skip of the experimental windows-vhdx job never
    # blocks publishing the linux multi-arch manifest; the VHDX entry is added
    # opportunistically below only when its artifact manifest exists.
    if: always() && needs.images.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        repo:
          - central
          - facility
          - frontend
          - patient-portal

    runs-on: ubuntu-latest
    name: Multi-arch for ${{ matrix.repo }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-manifest-tool
      - uses: ./.github/actions/setup-oras
      - name: Combine images
        run: |
          set -x
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u '${{ github.actor }}' --password-stdin
          image="ghcr.io/beyondessential/tamanu-${{ matrix.repo }}"
          sha="sha-${{ needs.config.outputs.sha }}"
          vhdx_type="application/vnd.au.bes.tamanu.windows-vhdx.v1+zstd"

          # The Windows VHDX artifact only exists for the server packages, and
          # only when windows-vhdx succeeded. Detect it rather than assume it.
          vhdx_ref=""
          if oras manifest fetch --descriptor "$image:$sha.windows-vhdx" >/dev/null 2>&1; then
            vhdx_ref="$image:$sha.windows-vhdx"
          fi

          # 1) Build the normal linux multi-arch index (unchanged behaviour).
          retag() {
            manifest-tool push from-args \
              --platforms linux/amd64,linux/arm64 \
              --template "$image:$1.ARCH" \
              --target "$image:$1" \
            || true
          }

          # 2) Append the Windows VHDX as an extra index entry. It carries the
          #    BES artifactType and an unknown/unknown platform, exactly like
          #    buildkit's attestation entries — so `docker pull`/containerd never
          #    select it (not even on a Windows host looking for windows/amd64),
          #    while a purpose-built BES client can discover it by artifactType.
          index_type="application/vnd.oci.image.index.v1+json"
          append_vhdx() {
            target="$1"
            [ -n "$vhdx_ref" ] || return 0
            desc="$(oras manifest fetch --descriptor "$vhdx_ref")"
            idx="$(oras manifest fetch "$image:$target")"
            aug="$(jq \
              --arg at "$vhdx_type" \
              --arg pkg "${{ matrix.repo }}" \
              '{
                 mediaType: .mediaType,
                 digest: .digest,
                 size: .size,
                 artifactType: $at,
                 platform: { architecture: "unknown", os: "unknown" },
                 annotations: {
                   "au.bes.tamanu.artifact": "windows-vhdx",
                   "au.bes.tamanu.package": $pkg,
                   "org.opencontainers.image.title": ("Tamanu " + $pkg + " (Windows VHDX)")
                 }
               }' <<<"$desc")"
            # Normalise to an OCI image index so a BES artifact entry (with
            # artifactType) is schema-valid, then re-push the tag.
            jq --argjson d "$aug" --arg mt "$index_type" \
              '.mediaType = $mt
               | .manifests |= (map(select(.digest != $d.digest)) + [$d])' <<<"$idx" \
              | oras manifest push --media-type "$index_type" "$image:$target" -
          }

          # append is best-effort: the linux index is already pushed by retag,
          # so a VHDX append failure must never fail this job.
          process() { retag "$1"; append_vhdx "$1" || echo "VHDX append skipped for $1"; }

          process "$sha"

          # quit now if we're not releasing
          # we can't have an empty string in the continue case because that's interpreted as falsy and writes 'exit'
          ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && '# continue' || 'exit' }}

          process v$(jq -r '.version' package.json)
          process v$(jq -r '.version | split(".") | .[0:2] | join(".")' package.json)
          process v$(jq -r '.version | split(".") | .[0]' package.json)

  deploy-up:
    needs:
      - config
      - multi-arch
    # If we're deploying (go-up):
    # - and we're building images (build-images), we need them (multi-arch) to succeed
    # - or if we're not building images, we need to ignore that multi-arch was skipped
    #
    # always() is how github actions knows to run this job even if a `needs` job failed/didn't run
    if: always() && needs.config.outputs.go-up == 'true' && (needs.config.outputs.build-images == 'false' || needs.multi-arch.result == 'success')

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.up) }}
    name: Deploy ${{ matrix.name }}
    uses: ./.github/workflows/cd-up.yml
    with:
      deploy-name: ${{ matrix.name }}
      options: ${{ matrix.options }}
      control: ${{ matrix.control }}
      image-tag: sha-${{ needs.config.outputs.sha }}
      ref: ${{ needs.config.outputs.ref }}
    secrets:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      TAMANU_OPS_SSH: ${{ secrets.TAMANU_OPS_SSH }}

  deploy-down:
    needs: config
    if: needs.config.outputs.go-down == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.down) }}
    name: Undeploy ${{ matrix.name }}
    uses: ./.github/workflows/cd-down.yml
    with:
      ref: ${{ needs.config.outputs.ref }}
      deploy-name: ${{ matrix.name }}
      options: ${{ matrix.options }}
    secrets:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      TAMANU_OPS_SSH: ${{ secrets.TAMANU_OPS_SSH }}

  fake-data:
    needs:
      - config
      - deploy-up
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.up) }}
    name: Add fake data to ${{ matrix.name }}
    uses: ./.github/workflows/cd-fake-data.yml
    with:
      deploy-name: ${{ matrix.name }}
      options: ${{ matrix.options }}

  package-android-test:
    needs: config
    if: needs.config.outputs.go-mobile == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.mobile) }}
    name: Package test Android for ${{ matrix.name }}
    uses: ./.github/workflows/cd-package-android.yml
    with:
      server: central.${{ matrix.name }}.cd.tamanu.app
      ref: ${{ needs.config.outputs.ref }}
      branding: ${{ fromJson(matrix.options).branding }}
      # Test builds are for QA on physical (arm64) devices, so only compile that
      # ABI. Avoids the New Architecture C++/CMake compile running once per ABI;
      # release builds (below) still produce all ABIs.
      architectures: arm64-v8a
    secrets:
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}

  # The package-* jobs below are only triggered by tags, so we can assume that
  # github.ref and github.ref_name are set and correct.

  package-frontends:
    needs: images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Package Frontends (web and patient portal) ${{ github.ref_name }}
    uses: ./.github/workflows/cd-package-frontend.yml
    secrets:
      META_CERT: ${{ secrets.META_CERT }}
      META_KEY: ${{ secrets.META_KEY }}

  package-servers:
    needs: images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Package Servers ${{ github.ref_name }}
    uses: ./.github/workflows/cd-package-servers.yml
    secrets:
      META_CERT: ${{ secrets.META_CERT }}
      META_KEY: ${{ secrets.META_KEY }}

  package-android-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Package release Android ${{ github.ref_name }}
    uses: ./.github/workflows/cd-package-android.yml
    secrets:
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      META_CERT: ${{ secrets.META_CERT }}
      META_KEY: ${{ secrets.META_KEY }}

  release-notes-images:
    needs:
      - config
      - multi-arch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Append image names to release notes
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          append_body: true
          body: |
            ## Container images 🚢

            | Repository | Tag |
            |:-----------|:---:|
            | `ghcr.io/beyondessential/tamanu-central` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-central/${{ github.ref_name }}) |
            | `ghcr.io/beyondessential/tamanu-facility` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-facility/${{ github.ref_name }}) |
            | `ghcr.io/beyondessential/tamanu-frontend` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-frontend/${{ github.ref_name }}) |
            | `ghcr.io/beyondessential/tamanu-patient-portal` | [${{ github.ref_name }}](https://github.com/beyondessential/tamanu/pkgs/container/tamanu-patient-portal/${{ github.ref_name }}) |

      - name: Post to meta
        continue-on-error: true
        run: |
          cat << EOF > ./meta.crt
          ${{ secrets.META_CERT }}
          EOF
          cat << EOF > ./meta.key
          ${{ secrets.META_KEY }}
          EOF

          version=$(echo "${{ github.ref_name }}" | sed -E 's/^v//')

          for image in central facility frontend patient-portal; do
            set -x
            curl -v "${{ vars.META_URL }}/artifacts/$version/$image/container" \
              -E meta.crt --key meta.key \
              --data-binary "oci://ghcr.io/beyondessential/tamanu-$image:${{ github.ref_name }}"
          done
