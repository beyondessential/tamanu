name: CD Package Android

env:
  TURBO_TELEMETRY_DISABLED: 1

permissions:
  contents: write # to update the release notes
  id-token: write # OIDC token for AWS
  pull-requests: write # to post apk link comment

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
      branding:
        type: string
        required: false
        default: tamanu
      server:
        type: string
        required: false
      architectures:
        type: string
        required: false
        description: Comma-separated Gradle reactNativeArchitectures override (e.g. arm64-v8a). When set, skips parallel ABI builds.
    secrets:
      ANDROID_SIGNING_KEY_PASSWORD:
        required: true
      ANDROID_SIGNING_STORE_PASSWORD:
        required: true

      # only required for release
      META_CERT:
        required: false
      META_KEY:
        required: false

  workflow_dispatch:
    inputs:
      branding:
        type: choice
        required: false
        default: tamanu
        options:
          - tamanu
      server:
        description: Central server override
        type: string
        required: false

jobs:
  prepare:
    if: ${{ !inputs.architectures }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/mobile-android-build-setup
        with:
          branding: ${{ inputs.branding }}
          server: ${{ inputs.server }}

      - name: Bundle JavaScript (once)
        working-directory: packages/mobile/android
        run: ./gradlew app:createBundleReleaseJsAndAssets

      - name: Archive JS bundle outputs
        working-directory: packages/mobile/android/app/build/generated
        run: |
          tar -czf "${{ runner.temp }}/android-js-bundle.tgz" \
            assets/react/release \
            res/react/release

      - name: Upload JS bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-js-bundle
          path: ${{ runner.temp }}/android-js-bundle.tgz
          retention-days: 1

  build-abi:
    needs: prepare
    if: ${{ !inputs.architectures }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/mobile-android-build-setup
        with:
          branding: ${{ inputs.branding }}
          server: ${{ inputs.server }}

      - name: Download JS bundle
        uses: actions/download-artifact@v4
        with:
          name: android-js-bundle
          path: ${{ runner.temp }}/android-js-bundle

      - name: Restore JS bundle outputs
        run: |
          GENERATED=packages/mobile/android/app/build/generated
          mkdir -p "${GENERATED}"
          tar -xzf "${{ runner.temp }}/android-js-bundle/android-js-bundle.tgz" -C "${GENERATED}"

      - uses: ./.github/actions/setup-android-ccache

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: android-ccache-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'packages/mobile/android/gradle.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}

      - name: Build release APK (${{ matrix.arch }})
        working-directory: packages/mobile/android
        run: ./gradlew app:assembleRelease -PreactNativeArchitectures=${{ matrix.arch }}

      - name: Print ccache stats (after build)
        if: always()
        run: ccache -s || true

      - name: Upload ccache partition
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccache-${{ matrix.arch }}
          path: ~/.ccache
          retention-days: 1
          include-hidden-files: true

      - name: Upload ABI APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.arch }}
          path: packages/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 1

  consolidate-ccache:
    needs: build-abi
    if: ${{ !inputs.architectures }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Download ccache partitions
        uses: actions/download-artifact@v4
        with:
          pattern: ccache-*
          path: ${{ runner.temp }}/ccache-parts
          merge-multiple: true

      - name: Merge ccache partitions
        shell: bash
        run: |
          mkdir -p ~/.ccache
          shopt -s nullglob
          for part in "${{ runner.temp }}/ccache-parts"/ccache-*/; do
            cp -an "${part}." ~/.ccache/
          done
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: android-ccache-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'packages/mobile/android/gradle.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}

  merge-and-release:
    needs: build-abi
    if: ${{ !inputs.architectures }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: android-actions/setup-android@v3

      - name: Install Android build-tools
        run: sdkmanager "build-tools;36.0.0"

      - name: Download ABI APKs
        uses: actions/download-artifact@v4
        with:
          pattern: android-apk-*
          path: ${{ runner.temp }}/abi-apks
          merge-multiple: true

      - name: Merge universal APK
        shell: bash
        run: |
          APK_DIR="${{ runner.temp }}/abi-apks"
          mapfile -t ALL_APKS < <(find "${APK_DIR}" -name 'app-release-unsigned.apk' | sort)
          if [[ ${#ALL_APKS[@]} -ne 4 ]]; then
            echo "Expected 4 ABI APKs, found ${#ALL_APKS[@]}:" "${ALL_APKS[@]}"
            exit 1
          fi
          BASE_ARM64=""
          for apk in "${ALL_APKS[@]}"; do
            if unzip -l "${apk}" | grep -q 'lib/arm64-v8a/'; then
              BASE_ARM64="${apk}"
              break
            fi
          done
          if [[ -z "${BASE_ARM64}" ]]; then
            echo "Could not find arm64-v8a base APK"
            exit 1
          fi
          OTHER=()
          for apk in "${ALL_APKS[@]}"; do
            if [[ "${apk}" != "${BASE_ARM64}" ]]; then
              OTHER+=("${apk}")
            fi
          done
          mkdir -p packages/mobile/android/app/build/outputs/apk/release
          bash .github/scripts/merge-android-release-apks.sh \
            packages/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "${BASE_ARM64}" \
            "${OTHER[@]}"

      - name: Sign universal APK
        env:
          ANDROID_SIGNING_KEY_ALIAS: ${{ vars.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
        run: |
          bash .github/scripts/sign-android-release-apk.sh \
            packages/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk \
            packages/mobile/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload final build
        id: artifact-upload
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.run_number }}
          path: packages/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Post comment with release link
        continue-on-error: true
        if: github.event_name == 'pull_request' || github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.artifact-upload.outputs.artifact-url }}
          BUILD_NUMBER: ${{ github.run_number }}
        with:
          script: |
            const { ARTIFACT_URL, BUILD_NUMBER } = process.env;
            const { repo, owner } = context.repo;
            const { number: issue_number } = context.issue;
            if (!issue_number) return;
            const params = {
              issue_number,
              owner,
              repo,
            };
            const headerContent = "**Android builds 📱**";
            const latestText = " **Latest**";
            const comments = await github.rest.issues.listComments(params);
            const existingComment = comments.data.find((comment) =>
              comment.body.includes(headerContent)
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                ...params,
                comment_id: existingComment.id,
                body: existingComment.body
                  .replace(latestText, "")
                  .replace(
                    headerContent,
                    `${headerContent}\n- **${BUILD_NUMBER}:** [Download Android APK](${ARTIFACT_URL})${latestText}`
                  ),
              });
            } else {
              await github.rest.issues.createComment({
                ...params,
                body: `${headerContent}\n- **${BUILD_NUMBER}:** [Download Android APK](${ARTIFACT_URL})${latestText}`,
              });
            }

      - name: Set S3 destination
        id: destination
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            if (context.ref == 'refs/heads/main') {
              return `main/${(new Date).toISOString().replaceAll(':','-').split('.')[0]}.${context.sha.slice(0, 10)}`;
            } else if (context.ref.startsWith('refs/tags/v')) {
              return context.ref.replace('refs/tags/v', '');
            } else if (context.ref.startsWith('refs/heads/release/')) {
              return `${context.ref.replace('refs/tags/', '')}-rc`;
            } else {
              return 'nowhere';
            }

      - name: Configure AWS Credentials (upload)
        if: steps.destination.outputs.result != 'nowhere'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-desktop-s3
          role-session-name: GHA@Tamanu=AndroidPackage

      - name: Push to S3
        if: steps.destination.outputs.result != 'nowhere'
        env:
          target: ${{ steps.destination.outputs.result }}
        run: |
          aws s3 cp --no-progress \
            packages/mobile/android/app/build/outputs/apk/release/app-release.apk \
            s3://bes-tamanu-release-clients/$target/android/${{ inputs.branding }}/app-release.apk

      - if: steps.destination.outputs.result != 'nowhere' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          body: |
            ## Mobile app 📱
            - [Android](https://clients.ops.tamanu.io/${{ steps.destination.outputs.result }}/android/${{ inputs.branding }}/app-release.apk)

      - name: Post to meta
        if: steps.destination.outputs.result != 'nowhere' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: ./.github/actions/meta-api
        with:
          url: ${{ vars.META_URL }}
          crt: ${{ secrets.META_CERT }}
          key: ${{ secrets.META_KEY }}
          api: /artifacts/${{ steps.destination.outputs.result }}/mobile/android
          arg: --data-binary 'https://clients.ops.tamanu.io/${{ steps.destination.outputs.result }}/android/${{ inputs.branding }}/app-release.apk'

  build-single:
    if: ${{ inputs.architectures }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/mobile-android-build-setup
        with:
          branding: ${{ inputs.branding }}
          server: ${{ inputs.server }}

      - uses: ./.github/actions/setup-android-ccache

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: android-ccache-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'packages/mobile/android/gradle.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}

      - name: Build release
        working-directory: packages/mobile/android
        env:
          ANDROID_SIGNING_KEY_ALIAS: ${{ vars.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
        run: ./gradlew app:assembleRelease -PreactNativeArchitectures=${{ inputs.architectures }}

      - name: Print ccache stats (after build)
        if: always()
        run: ccache -s || true

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: android-ccache-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'packages/mobile/android/gradle.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}

      - name: Prepare signed APK artifact
        working-directory: packages/mobile/android/app/build/outputs/apk/release
        run: |
          if [[ -f app-release.apk ]]; then
            echo "Using Gradle-signed app-release.apk"
          elif [[ -f app-release-unsigned.apk ]]; then
            cp app-release-unsigned.apk app-release.apk
          else
            echo "No release APK found"
            exit 1
          fi

      - name: Upload final build
        id: artifact-upload
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.run_number }}
          path: packages/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Post comment with release link
        continue-on-error: true
        if: github.event_name == 'pull_request' || github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.artifact-upload.outputs.artifact-url }}
          BUILD_NUMBER: ${{ github.run_number }}
        with:
          script: |
            const { ARTIFACT_URL, BUILD_NUMBER } = process.env;
            const { repo, owner } = context.repo;
            const { number: issue_number } = context.issue;
            if (!issue_number) return;
            const params = {
              issue_number,
              owner,
              repo,
            };
            const headerContent = "**Android builds 📱**";
            const latestText = " **Latest**";
            const comments = await github.rest.issues.listComments(params);
            const existingComment = comments.data.find((comment) =>
              comment.body.includes(headerContent)
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                ...params,
                comment_id: existingComment.id,
                body: existingComment.body
                  .replace(latestText, "")
                  .replace(
                    headerContent,
                    `${headerContent}\n- **${BUILD_NUMBER}:** [Download Android APK](${ARTIFACT_URL})${latestText}`
                  ),
              });
            } else {
              await github.rest.issues.createComment({
                ...params,
                body: `${headerContent}\n- **${BUILD_NUMBER}:** [Download Android APK](${ARTIFACT_URL})${latestText}`,
              });
            }

      - name: Set S3 destination
        id: destination
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            if (context.ref == 'refs/heads/main') {
              return `main/${(new Date).toISOString().replaceAll(':','-').split('.')[0]}.${context.sha.slice(0, 10)}`;
            } else if (context.ref.startsWith('refs/tags/v')) {
              return context.ref.replace('refs/tags/v', '');
            } else if (context.ref.startsWith('refs/heads/release/')) {
              return `${context.ref.replace('refs/tags/', '')}-rc`;
            } else {
              return 'nowhere';
            }

      - name: Configure AWS Credentials (upload)
        if: steps.destination.outputs.result != 'nowhere'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-desktop-s3
          role-session-name: GHA@Tamanu=AndroidPackage

      - name: Push to S3
        if: steps.destination.outputs.result != 'nowhere'
        env:
          target: ${{ steps.destination.outputs.result }}
        run: |
          aws s3 cp --no-progress \
            packages/mobile/android/app/build/outputs/apk/release/app-release.apk \
            s3://bes-tamanu-release-clients/$target/android/${{ inputs.branding }}/app-release.apk

      - if: steps.destination.outputs.result != 'nowhere' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          body: |
            ## Mobile app 📱
            - [Android](https://clients.ops.tamanu.io/${{ steps.destination.outputs.result }}/android/${{ inputs.branding }}/app-release.apk)

      - name: Post to meta
        if: steps.destination.outputs.result != 'nowhere' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: ./.github/actions/meta-api
        with:
          url: ${{ vars.META_URL }}
          crt: ${{ secrets.META_CERT }}
          key: ${{ secrets.META_KEY }}
          api: /artifacts/${{ steps.destination.outputs.result }}/mobile/android
          arg: --data-binary 'https://clients.ops.tamanu.io/${{ steps.destination.outputs.result }}/android/${{ inputs.branding }}/app-release.apk'
