name: CD Package Android

env:
  TURBO_TELEMETRY_DISABLED: 1

permissions:
  contents: write # to update the release notes
  id-token: write # OIDC token for AWS
  pull-requests: write # to post apk link comment

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
      branding:
        type: string
        required: false
        default: tamanu
      server:
        type: string
        required: false
      architectures:
        type: string
        required: false
        description: Comma-separated Gradle reactNativeArchitectures override (e.g. arm64-v8a)
    secrets:
      ANDROID_SIGNING_KEY_PASSWORD:
        required: true
      ANDROID_SIGNING_STORE_PASSWORD:
        required: true

      # only required for release
      META_CERT:
        required: false
      META_KEY:
        required: false

  workflow_dispatch:
    inputs:
      branding:
        type: choice
        required: false
        default: tamanu
        options:
          - tamanu
      server:
        description: Central server override
        type: string
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: /home/runner/.ccache
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/mobile-android-build-setup
        with:
          branding: ${{ inputs.branding }}
          server: ${{ inputs.server }}

      - uses: ./.github/actions/setup-android-ccache

      - name: Init ccache directory
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config cache_dir="$CCACHE_DIR"

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          # Exact key is unique per run; restore-keys reuses the latest cache for this branch + deps hash.
          key: android-ccache-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'packages/mobile/android/gradle.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}-${{ github.run_id }}
          restore-keys: |
            android-ccache-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'packages/mobile/android/gradle.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}

      - name: Configure ccache
        run: |
          ccache --set-config compiler_check=content
          ccache --set-config max_size=5G
          ccache --set-config hash_dir=false
          ccache --set-config sloppiness=locale,time_macros,include_file_mtime,include_file_ctime,pch_defines
          ccache --zero-stats
          echo "GHA cache primary hit: ${{ steps.ccache-restore.outputs.cache-hit }}"
          echo "GHA cache matched key: ${{ steps.ccache-restore.outputs.cache-matched-key }}"
          ccache -s || true

      - name: Build release
        working-directory: packages/mobile/android
        env:
          ANDROID_SIGNING_KEY_ALIAS: ${{ vars.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
        run: |
          ARCH_ARGS=""
          if [ -n "${{ inputs.architectures }}" ]; then
            ARCH_ARGS="-PreactNativeArchitectures=${{ inputs.architectures }}"
          fi
          ./gradlew app:assembleRelease $ARCH_ARGS

      - name: Print ccache stats (after build)
        if: always()
        run: |
          echo "ccache cache_dir: $(ccache --get-config cache_dir)"
          du -sh "$CCACHE_DIR" || true
          ccache -s || true

      - name: Verify ccache directory before save
        if: always()
        id: ccache-verify
        run: |
          ACTUAL="$(ccache --get-config cache_dir)"
          if [ "$ACTUAL" != "$CCACHE_DIR" ]; then
            echo "::error::ccache cache_dir is $ACTUAL but CCACHE_DIR is $CCACHE_DIR"
            exit 1
          fi
          if [ ! -d "$CCACHE_DIR" ] || [ -z "$(ls -A "$CCACHE_DIR" 2>/dev/null)" ]; then
            echo "::warning::No ccache data to save (build may have failed before native compile)"
            echo "save=false" >> "$GITHUB_OUTPUT"
          else
            du -sh "$CCACHE_DIR"
            echo "save=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save ccache
        if: always() && steps.ccache-verify.outputs.save == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          # Unique per workflow run + deploy target so parallel CD matrix jobs do not race on save.
          key: android-ccache-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'packages/mobile/android/gradle.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.server || inputs.branding || 'default' }}

      - name: Prepare signed APK artifact
        working-directory: packages/mobile/android/app/build/outputs/apk/release
        run: |
          if [[ -f app-release.apk ]]; then
            echo "Using Gradle-signed app-release.apk"
          elif [[ -f app-release-unsigned.apk ]]; then
            cp app-release-unsigned.apk app-release.apk
          else
            echo "No release APK found"
            exit 1
          fi

      - name: Upload final build
        id: artifact-upload
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.run_number }}
          path: packages/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Post comment with release link
        continue-on-error: true
        if: github.event_name == 'pull_request' || github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.artifact-upload.outputs.artifact-url }}
          BUILD_NUMBER: ${{ github.run_number }}
        with:
          script: |
            const { ARTIFACT_URL, BUILD_NUMBER } = process.env;
            const { repo, owner } = context.repo;
            const { number: issue_number } = context.issue;
            if (!issue_number) return;
            const params = {
              issue_number,
              owner,
              repo,
            };
            const headerContent = "**Android builds 📱**";
            const latestText = " **Latest**";
            const comments = await github.rest.issues.listComments(params);
            const existingComment = comments.data.find((comment) =>
              comment.body.includes(headerContent)
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                ...params,
                comment_id: existingComment.id,
                body: existingComment.body
                  .replace(latestText, "")
                  .replace(
                    headerContent,
                    `${headerContent}\n- **${BUILD_NUMBER}:** [Download Android APK](${ARTIFACT_URL})${latestText}`
                  ),
              });
            } else {
              await github.rest.issues.createComment({
                ...params,
                body: `${headerContent}\n- **${BUILD_NUMBER}:** [Download Android APK](${ARTIFACT_URL})${latestText}`,
              });
            }

      - name: Set S3 destination
        id: destination
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            if (context.ref == 'refs/heads/main') {
              return `main/${(new Date).toISOString().replaceAll(':','-').split('.')[0]}.${context.sha.slice(0, 10)}`;
            } else if (context.ref.startsWith('refs/tags/v')) {
              return context.ref.replace('refs/tags/v', '');
            } else if (context.ref.startsWith('refs/heads/release/')) {
              return `${context.ref.replace('refs/tags/', '')}-rc`;
            } else {
              return 'nowhere';
            }

      - name: Configure AWS Credentials (upload)
        if: steps.destination.outputs.result != 'nowhere'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-desktop-s3
          role-session-name: GHA@Tamanu=AndroidPackage

      - name: Push to S3
        if: steps.destination.outputs.result != 'nowhere'
        env:
          target: ${{ steps.destination.outputs.result }}
        run: |
          aws s3 cp --no-progress \
            packages/mobile/android/app/build/outputs/apk/release/app-release.apk \
            s3://bes-tamanu-release-clients/$target/android/${{ inputs.branding }}/app-release.apk

      - if: steps.destination.outputs.result != 'nowhere' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          append_body: true
          body: |
            ## Mobile app 📱
            - [Android](https://clients.ops.tamanu.io/${{ steps.destination.outputs.result }}/android/${{ inputs.branding }}/app-release.apk)

      - name: Post to meta
        if: steps.destination.outputs.result != 'nowhere' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: ./.github/actions/meta-api
        with:
          url: ${{ vars.META_URL }}
          crt: ${{ secrets.META_CERT }}
          key: ${{ secrets.META_KEY }}
          api: /artifacts/${{ steps.destination.outputs.result }}/mobile/android
          arg: --data-binary 'https://clients.ops.tamanu.io/${{ steps.destination.outputs.result }}/android/${{ inputs.branding }}/app-release.apk'
