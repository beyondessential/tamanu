name: Cut Release Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: Bump version on main to the next
        required: true
        type: choice
        options:
          - minor
          - major
        default: minor

permissions: {}

jobs:
  run:
    name: Cut Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      branch: ${{ steps.release.outputs.branch }}
      version: ${{ steps.release.outputs.version }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        token: ${{ secrets.TAMANU_RELEASE_PAT }}

    - name: Set up committer info
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com

    - uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'

    - name: Compute new release branch and version
      uses: actions/github-script@v7
      id: release
      with:
        github-token: ${{ secrets.TAMANU_RELEASE_PAT }}
        script: |
          const cwd = '${{ github.workspace }}';
          const { currentVersion } = await import(`${cwd}/scripts/gha-release-ops.mjs`);
          const { branch, version } = currentVersion(await import('fs'), cwd);
          core.setOutput('branch', branch);
          core.setOutput('version', version);

    - name: Check new release branch doesn't already exist
      uses: actions/github-script@v7
      env:
        NEW_BRANCH_NAME: ${{ steps.release.outputs.branch }}
      with:
        github-token: ${{ secrets.TAMANU_RELEASE_PAT }}
        script: |
          const cwd = '${{ github.workspace }}';
          const { checkBranchDoesNotExist } = await import(`${cwd}/scripts/gha-release-ops.mjs`);
          await checkBranchDoesNotExist(github, context, process.env.NEW_BRANCH_NAME);

    - name: Create new release branch
      env:
        NEW_BRANCH_NAME: ${{ steps.release.outputs.branch }}
      run: |
        set -ex
        git switch --create "$NEW_BRANCH_NAME"
        # Refresh caniuse-lite so the web bundle's runtime browser gate (see
        # packages/web/vite.config.js) reflects Chrome as of this cut. Carried by
        # the cut-off commit; --allow-empty covers the case where it's unchanged.
        npx --yes update-browserslist-db@latest
        git commit -am "release: Cut-off for $NEW_BRANCH_NAME" --allow-empty
        git push origin "$NEW_BRANCH_NAME"
        git switch main

    - name: Bump version on main
      run: |
        node scripts/version.mjs '${{ inputs.version }}'
        npm install
        # Also refresh caniuse-lite on main (not just the release branch above),
        # otherwise main's browser gate data drifts permanently out of date.
        # Committed alongside the version bump by the next step.
        npx --yes update-browserslist-db@latest

    - name: Commit and push
      run: |
        set -ex
        version=$(jq -r .version package.json)
        git commit -am "release: Bump version to $version"
        git push

    - name: Trigger tamanu-source-dbt upgrade workflow
      env:
        NEW_BRANCH_NAME: ${{ steps.release.outputs.branch }}
      run: |
        curl -fsSL -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.DBT_REPO_DISPATCH_PAT }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/beyondessential/tamanu-source-dbt/dispatches \
          -d "{\"event_type\":\"tamanu-release-created\",\"client_payload\":{\"branch\":\"$NEW_BRANCH_NAME\"}}"

        echo "✅ Triggered tamanu-source-dbt upgrade workflow for $NEW_BRANCH_NAME"

  build-seed-image:
    needs: [run]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      git_sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.run.outputs.branch }}

      - name: Get branch HEAD SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - uses: docker/setup-buildx-action@v3

      - name: Build and push seed image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.seed
          push: true
          platforms: linux/arm64
          tags: ghcr.io/beyondessential/tamanu-seed:${{ needs.run.outputs.version }}
          build-args: GIT_SHA=${{ steps.sha.outputs.sha }}

  # Snapshot creation is best-effort: seed-snapshot.yml marks its infra-touching
  # steps continue-on-error, so a degraded snapshotter doesn't fail this run.
  # (continue-on-error isn't valid on a reusable-workflow call, so the tolerance
  # lives in the called workflow's steps instead.) The release branch is also
  # already cut by the `run` job above, so a failure here can never undo it.
  # Re-run via workflow_dispatch on seed-snapshot.yml to retry.
  seed-snapshot:
    needs: [run, build-seed-image]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/seed-snapshot.yml
    secrets: inherit
    with:
      branch: ${{ needs.run.outputs.branch }}
      version: ${{ needs.run.outputs.version }}
      image: ghcr.io/beyondessential/tamanu-seed:${{ needs.run.outputs.version }}
      git_sha: ${{ needs.build-seed-image.outputs.git_sha }}
