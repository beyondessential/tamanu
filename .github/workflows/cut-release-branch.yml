name: Cut Release Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: Bump version on main to the next
        required: true
        type: choice
        options:
          - minor
          - major
        default: minor

permissions: {}

jobs:
  run:
    name: Cut Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      branch: ${{ steps.release.outputs.branch }}
      version: ${{ steps.release.outputs.version }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        token: ${{ secrets.TAMANU_RELEASE_PAT }}

    - name: Set up committer info
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com

    - uses: actions/setup-node@v6
      with:
        node-version-file: '.node-version'

    - name: Compute release branch and version
      uses: actions/github-script@v7
      id: release
      with:
        github-token: ${{ secrets.TAMANU_RELEASE_PAT }}
        script: |
          const cwd = '${{ github.workspace }}';
          const { currentVersion } = await import(`${cwd}/scripts/gha-release-ops.mjs`);
          const { branch, version } = currentVersion(await import('fs'), cwd);
          core.setOutput('branch', branch);
          core.setOutput('version', version);

    - name: Check new release branch doesn't already exist
      uses: actions/github-script@v7
      env:
        NEW_BRANCH_NAME: ${{ steps.release.outputs.branch }}
      with:
        github-token: ${{ secrets.TAMANU_RELEASE_PAT }}
        script: |
          const cwd = '${{ github.workspace }}';
          const { checkBranchDoesNotExist } = await import(`${cwd}/scripts/gha-release-ops.mjs`);
          await checkBranchDoesNotExist(github, context, process.env.NEW_BRANCH_NAME);

    - name: Create new release branch
      env:
        NEW_BRANCH_NAME: ${{ steps.release.outputs.branch }}
      run: |
        set -ex
        git switch --create "$NEW_BRANCH_NAME"
        git commit --allow-empty -m "release: Cut-off for $NEW_BRANCH_NAME"
        git push origin "$NEW_BRANCH_NAME"
        git switch main

    - name: Bump version on main
      run: |
        node scripts/version.mjs '${{ inputs.version }}'
        npm install

    - name: Commit and push
      run: |
        set -ex
        version=$(jq -r .version package.json)
        git commit -am "release: Bump version to $version"
        git push

    - name: Trigger tamanu-source-dbt upgrade workflow
      env:
        NEW_BRANCH_NAME: ${{ steps.release.outputs.branch }}
      run: |
        curl -fsSL -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.DBT_REPO_DISPATCH_PAT }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/beyondessential/tamanu-source-dbt/dispatches \
          -d "{\"event_type\":\"tamanu-release-created\",\"client_payload\":{\"branch\":\"$NEW_BRANCH_NAME\"}}"

        echo "✅ Triggered tamanu-source-dbt upgrade workflow for $NEW_BRANCH_NAME"

  build-seed-image:
    needs: [run]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.run.outputs.branch }}
          token: ${{ secrets.TAMANU_RELEASE_PAT }}

      - name: Get git SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Build packages
        run: |
          npm ci
          npm run build-shared
          npm run build -w packages/central-server
          npm run build -w packages/scripts
          npm prune --production
          rm -rf packages/web packages/patient-portal

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - uses: docker/setup-buildx-action@v3

      - name: Build and push seed image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.seed
          push: true
          platforms: linux/amd64
          tags: ghcr.io/beyondessential/tamanu-seed:${{ needs.run.outputs.version }}
          build-args: GIT_SHA=${{ steps.sha.outputs.sha }}

  seed-snapshot:
    needs: [run, build-seed-image]
    if: always() && needs.run.result == 'success' && needs.build-seed-image.result == 'success'
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/seed-snapshot.yml
    secrets: inherit
    with:
      branch: ${{ needs.run.outputs.branch }}
      version: ${{ needs.run.outputs.version }}
      image: ghcr.io/beyondessential/tamanu-seed:${{ needs.run.outputs.version }}
