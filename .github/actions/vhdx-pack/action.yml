name: Pack VHDX as an OCI artifact
description: >
  Compress a built VHDX with zstd and push it to ghcr.io as a BES OCI artifact,
  attaching a runtime config blob (mirroring the Docker image config) that
  describes how to run the bundle once the VHDX is mounted. Expects the calling
  job to have set VHDX_PATH in the environment (via GITHUB_ENV) beforehand.
inputs:
  package:
    required: true
    description: central | facility | frontend | patient-portal
  package-path:
    required: true
    description: workspace path of the package, e.g. central-server | web
  kind:
    required: true
    description: server | frontend (shapes the runtime config blob)
  root-dir:
    required: true
    description: top-level directory inside the VHDX (WorkingDir base)
  version:
    required: true
    description: app version string
  sha:
    required: true
    description: commit sha driving the image tags
  github-token:
    required: true
    description: token for ghcr.io login
runs:
  using: composite
  steps:
    - name: Compress VHDX
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        choco install zstandard --no-progress -y
        Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
        refreshenv
        zstd --rm -T0 -19 $env:VHDX_PATH

    - name: Install oras
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $ver = '1.2.0'
        Invoke-WebRequest -Uri "https://github.com/oras-project/oras/releases/download/v$ver/oras_${ver}_windows_amd64.zip" -OutFile oras.zip
        Expand-Archive -Path oras.zip -DestinationPath oras-bin -Force
        "$PWD\oras-bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
        & "$PWD\oras-bin\oras.exe" version

    - name: Push VHDX artifact
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PKG: ${{ inputs.package }}
        VERSION: ${{ inputs.version }}
        SHA: ${{ inputs.sha }}
        KIND: ${{ inputs.kind }}
        PKG_PATH: ${{ inputs.package-path }}
        ROOT_DIR: ${{ inputs.root-dir }}
        ARTIFACT_TYPE: application/vnd.au.bes.tamanu.windows-vhdx.v1+zstd
        CONFIG_TYPE: application/vnd.au.bes.tamanu.windows-vhdx.config.v1+json
      run: |
        set -euxo pipefail
        echo "$GH_TOKEN" | oras login ghcr.io -u '${{ github.actor }}' --password-stdin
        image="ghcr.io/beyondessential/tamanu-$PKG"
        tag="sha-$SHA.windows-vhdx"
        vhdx="tamanu-$PKG-$VERSION-windows-amd64.vhdx.zst"

        # Runtime config blob, mirroring the linux Docker image config: how to run
        # what's inside the VHDX once mounted. WorkingDir and PATH are relative to
        # the volume root ($ROOT_DIR maps to the container's /app); paths use
        # forward slashes like the Docker config. Values match the production
        # images — servers via docker-entrypoint.sh's effective
        # `node --import tsx app serve`, frontends via caddy. Unlike a container,
        # a mounted VHDX has no implicit PATH, so PATH carries the dir holding the
        # runtime we embed (runtime/node.exe for servers, caddy.exe at the bundle
        # root for frontends) — that is how the bare Entrypoint binary resolves.
        if [ "$KIND" = "frontend" ]; then
          runcfg="$(jq -n --arg wd "$ROOT_DIR" '{
            WorkingDir: $wd,
            Env: ["NODE_ENV=production", ("PATH=" + $wd)],
            Entrypoint: ["caddy"],
            Cmd: ["run","--config","Caddyfile","--adapter","caddyfile"],
            ExposedPorts: {"3000/tcp": {}}
          }')"
        else
          runcfg="$(jq -n --arg wd "$ROOT_DIR" --arg pp "$PKG_PATH" '{
            WorkingDir: ($wd + "/packages/" + $pp),
            Env: ["NODE_ENV=production", "PORT=3000", "NODE_CONFIG_DIR=config/", ("PATH=" + $wd + "/runtime")],
            Entrypoint: ["node","--import","tsx","app"],
            Cmd: ["serve"],
            ExposedPorts: {"3000/tcp": {}}
          }')"
        fi
        jq -n \
          --arg os windows --arg arch amd64 \
          --arg pkg "$PKG" --arg root "$ROOT_DIR" \
          --argjson config "$runcfg" \
          '{schemaVersion:1, os:$os, architecture:$arch, package:$pkg,
            vhdx:{rootDir:$root}, config:$config}' \
          > runconfig.json
        cat runconfig.json

        # Push with a BES-specific config media type (not an OCI image config), so
        # container runtimes never treat it as a runnable image; the config blob
        # carries the runtime characteristics above and the VHDX layer keeps its
        # BES media type. In the multi-arch index it also gets an unknown/unknown
        # platform that runtimes deliberately never select.
        oras push "$image:$tag" \
          --config "runconfig.json:$CONFIG_TYPE" \
          --annotation "org.opencontainers.image.title=Tamanu $PKG (Windows VHDX)" \
          --annotation "org.opencontainers.image.version=$VERSION" \
          --annotation "org.opencontainers.image.source=https://github.com/beyondessential/tamanu/" \
          --annotation "org.opencontainers.image.vendor=BES International" \
          --annotation "org.opencontainers.image.licenses=GPL-3.0-or-later" \
          --annotation "au.bes.tamanu.package=$PKG" \
          --annotation "au.bes.tamanu.os=windows" \
          --annotation "au.bes.tamanu.arch=amd64" \
          "$vhdx:$ARTIFACT_TYPE"
